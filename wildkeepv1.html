<meta name="theme-color" content="#0f1f14">
<style>
  :root{
    --gold:#f0c05a; --gold2:#d99a2b; --ink:#0d1410; --txt:#f2efe6;
    --glass:rgba(13,19,15,.82); --line:rgba(240,192,90,.28);
    --red:#ff6a5e; --blue:#7fd4f0;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:#070b08;overflow:hidden;
    font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 120% at 50% 30%, #12241a 0%, #070b08 70%);}
  #stage{position:relative;width:min(100vw,177.78vh);height:min(100vh,56.25vw);
    overflow:hidden;user-select:none;box-shadow:0 0 80px rgba(0,0,0,.6) inset;}
  #bg, #cv{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;}
  #stage.placing #cv{cursor:crosshair;}
  /* phones: fill the whole screen edge-to-edge, no empty bars
     (portrait auto-rotates to landscape; a slight stretch is traded for a full-bleed fit) */
  @media (orientation:portrait) and (max-width:900px){
    #stage{width:100vh;height:100vw;transform:rotate(90deg);flex:none;}
  }
  @media (orientation:landscape) and (max-height:600px){
    #stage{width:100vw;height:100vh;flex:none;}
  }

  /* ---------- top bar ---------- */
  #topbar{position:absolute;top:10px;left:12px;right:12px;display:flex;
    justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:5;}
  .cluster{display:flex;gap:8px;pointer-events:auto;flex-wrap:wrap;}
  .pill{display:flex;align-items:center;gap:7px;background:var(--glass);
    border:1px solid var(--line);border-radius:12px;padding:7px 13px;
    color:var(--txt);font-weight:700;font-size:clamp(12px,1.5vw,16px);
    letter-spacing:.04em;backdrop-filter:blur(8px);box-shadow:0 4px 14px rgba(0,0,0,.35);}
  .coin{width:14px;height:14px;border-radius:50%;flex:none;
    background:radial-gradient(circle at 35% 30%, #ffe9a8, #f0c05a 55%, #b97b16);
    box-shadow:0 0 6px rgba(240,192,90,.7);}
  .heart{color:var(--red);font-size:1.05em;line-height:1;text-shadow:0 0 8px rgba(255,106,94,.6);}
  .pill.hurt{animation:hurt .4s ease;}
  @keyframes hurt{0%,100%{transform:none}30%{transform:scale(1.15);box-shadow:0 0 18px rgba(255,80,60,.8)}}
  .btn{border:1px solid var(--line);border-radius:12px;padding:7px 14px;cursor:pointer;
    font-weight:800;font-size:clamp(12px,1.5vw,16px);letter-spacing:.05em;
    color:var(--txt);background:var(--glass);backdrop-filter:blur(8px);
    transition:transform .12s, filter .12s;box-shadow:0 4px 14px rgba(0,0,0,.35);}
  .btn:hover{filter:brightness(1.18);transform:translateY(-1px);}
  .btn:active{transform:translateY(1px);}
  .btn.gold{background:linear-gradient(180deg,#ffd77d,#d99a2b);color:#231803;border-color:#ffe3a0;}
  .btn.gold.pulse{animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(240,192,90,.55)}50%{box-shadow:0 0 0 9px rgba(240,192,90,0)}}
  .btn:disabled{opacity:.55;cursor:default;filter:none;transform:none;animation:none;}

  /* ---------- tower dock ---------- */
  #dock{position:absolute;left:50%;bottom:10px;transform:translateX(-50%);
    display:flex;gap:clamp(6px,1vw,12px);z-index:5;}
  .card{width:clamp(66px,8.6vw,96px);background:var(--glass);border:1px solid var(--line);
    border-radius:14px;padding:7px 4px 6px;text-align:center;cursor:pointer;color:var(--txt);
    backdrop-filter:blur(8px);transition:transform .12s, box-shadow .12s, border-color .12s;
    box-shadow:0 6px 18px rgba(0,0,0,.4);}
  .card:hover{transform:translateY(-4px);}
  .card.sel{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold),0 8px 22px rgba(0,0,0,.5);
    transform:translateY(-4px);}
  .card.off{filter:grayscale(.9) brightness(.6);}
  .card canvas{position:relative;width:clamp(38px,4.6vw,52px);height:clamp(38px,4.6vw,52px);margin:0 auto;display:block;}
  .card .nm{font-size:clamp(9px,1.05vw,12px);font-weight:800;letter-spacing:.08em;margin-top:2px;}
  .card .ct{font-size:clamp(9px,1.05vw,12px);font-weight:700;color:var(--gold);
    display:flex;align-items:center;justify-content:center;gap:4px;margin-top:1px;}
  .card .ct .coin{width:9px;height:9px;}
  .card .hk{position:absolute;margin-top:-2px;font-size:9px;opacity:.45;letter-spacing:.05em;}

  /* ---------- tower popup ---------- */
  #pop{position:absolute;z-index:6;background:var(--glass);border:1px solid var(--line);
    border-radius:14px;padding:11px 13px;color:var(--txt);min-width:172px;display:none;
    backdrop-filter:blur(10px);box-shadow:0 10px 30px rgba(0,0,0,.55);}
  #pop.show{display:block;animation:popin .14s ease;}
  @keyframes popin{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
  #popName{font-weight:800;letter-spacing:.06em;font-size:14px;display:flex;
    justify-content:space-between;align-items:center;gap:10px;}
  #popPips{display:flex;gap:4px;}
  #popPips i{width:8px;height:8px;border-radius:50%;background:#3a4238;display:block;}
  #popPips i.on{background:var(--gold);box-shadow:0 0 6px rgba(240,192,90,.8);}
  #popStats{margin:8px 0;font-size:12px;line-height:1.65;color:#cfd8c8;}
  #popStats b{color:var(--txt);}
  #popStats .nx{color:var(--gold);font-weight:700;}
  .popBtns{display:flex;gap:7px;}
  .popBtns button{flex:1;border:none;border-radius:9px;padding:8px 6px;font-weight:800;
    font-size:11.5px;cursor:pointer;letter-spacing:.03em;}
  #upgBtn{background:linear-gradient(180deg,#ffd77d,#d99a2b);color:#231803;}
  #upgBtn:disabled{background:#2c332c;color:#788072;cursor:default;}
  #sellBtn{background:#3a2320;color:#ffb0a6;border:1px solid rgba(255,106,94,.35);}
  .popBtns button:hover:not(:disabled){filter:brightness(1.15);}
  .priobtn{width:100%;margin:2px 0 7px;border:1px solid var(--line);border-radius:9px;
    padding:7px 6px;font-weight:800;font-size:11px;letter-spacing:.03em;cursor:pointer;
    background:rgba(240,192,90,.12);color:var(--gold);}
  .priobtn:hover{filter:brightness(1.25);}

  /* ---------- ability bar ---------- */
  #abils{position:absolute;left:12px;bottom:12px;display:flex;gap:9px;z-index:5;}
  .abil{position:relative;width:clamp(50px,6.4vw,66px);height:clamp(50px,6.4vw,66px);
    border-radius:14px;border:1px solid var(--line);background:var(--glass);color:var(--txt);
    cursor:pointer;backdrop-filter:blur(8px);box-shadow:0 6px 18px rgba(0,0,0,.4);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;overflow:hidden;
    transition:transform .12s, border-color .12s, filter .12s;}
  .abil:hover{transform:translateY(-3px);border-color:var(--gold);}
  .abil.ready{border-color:rgba(240,192,90,.7);animation:apulse 1.8s ease-in-out infinite;}
  @keyframes apulse{0%,100%{box-shadow:0 6px 18px rgba(0,0,0,.4)}50%{box-shadow:0 0 0 3px rgba(240,192,90,.25),0 6px 18px rgba(0,0,0,.4)}}
  .abil.armed{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold),0 6px 18px rgba(0,0,0,.5);}
  .abil .ai{font-size:clamp(18px,2.4vw,24px);line-height:1;}
  .abil .an{font-size:9px;font-weight:800;letter-spacing:.06em;opacity:.85;}
  .abil .ak{position:absolute;top:3px;right:5px;font-size:8px;opacity:.5;font-weight:700;}
  .abil .cov{position:absolute;inset:0;background:conic-gradient(rgba(6,10,7,.78) var(--deg,0deg),transparent 0);
    pointer-events:none;}
  .abil .cd{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:15px;color:#ffe6a6;pointer-events:none;}
  .abil.off{filter:grayscale(.5) brightness(.7);}

  /* ---------- next wave confirm ---------- */
  #nextWave{position:absolute;left:50%;top:62px;transform:translateX(-50%);z-index:6;
    background:var(--glass);border:1px solid var(--gold);border-radius:18px;
    padding:14px 26px 16px;text-align:center;color:var(--txt);display:none;
    backdrop-filter:blur(10px);box-shadow:0 14px 40px rgba(0,0,0,.5),0 0 30px rgba(240,192,90,.18);
    animation:popin .2s ease;max-width:min(88vw,420px);}
  #nextWave.show{display:block;}
  #nwTitle{font-weight:900;letter-spacing:.18em;font-size:clamp(17px,2.5vw,25px);
    background:linear-gradient(180deg,#ffe9a8,#e9a93c);-webkit-background-clip:text;
    background-clip:text;color:transparent;margin-bottom:4px;}
  #nwHint{font-size:clamp(11px,1.5vw,13.5px);color:#cfd8c8;margin-bottom:12px;line-height:1.7;}
  #nwHint b{color:var(--gold);}
  #advBtn{display:none;margin:0 auto 9px;border-color:var(--gold);color:var(--gold);
    background:rgba(240,192,90,.10);font-size:clamp(12px,1.6vw,14px);padding:9px 20px;}
  #advBtn.show{display:block;}
  #advBtn:disabled{opacity:.6;border-color:var(--line);color:#b9c4ae;background:transparent;}
  .card.can{border-color:rgba(240,192,90,.6);}

  /* ---------- tutorial ---------- */
  #tut{position:absolute;left:50%;bottom:calc(clamp(86px,11vw,110px) + 24px);z-index:7;
    background:var(--glass);border:1px solid var(--gold);border-radius:14px;
    padding:10px 16px 9px;color:var(--txt);text-align:center;max-width:min(86vw,370px);
    display:none;backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,.5),0 0 26px rgba(240,192,90,.28);
    animation:tutbob 2.2s ease-in-out infinite;}
  #tut.show{display:block;}
  @keyframes tutbob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}
  #tutStep{font-size:10px;letter-spacing:.24em;color:var(--gold);font-weight:800;margin-bottom:3px;}
  #tutTxt{font-size:clamp(12px,1.6vw,14.5px);line-height:1.55;}
  #tutTxt b{color:var(--gold);}
  #tutTxt .dim{opacity:.65;font-size:.86em;}
  #tutSkip{margin-top:7px;background:none;border:none;color:#9aa694;font-size:10.5px;
    cursor:pointer;letter-spacing:.06em;text-decoration:underline;padding:0;}
  #tutSkip:hover{color:#d8e2cc;}
  .tut-glow{animation:tutglow 1.1s ease-in-out infinite !important;border-color:var(--gold) !important;}
  @keyframes tutglow{0%,100%{box-shadow:0 0 0 2px var(--gold),0 6px 18px rgba(0,0,0,.4)}
    50%{box-shadow:0 0 0 5px var(--gold),0 0 28px rgba(240,192,90,.85)}}

  /* ---------- overlays ---------- */
  #overlay{position:absolute;inset:0;z-index:10;display:flex;align-items:flex-start;
    justify-content:center;overflow-y:auto;overscroll-behavior:contain;padding:14px 12px;
    background:rgba(5,9,6,.72);backdrop-filter:blur(6px);}
  #overlay.hide{display:none;}
  #overlay::-webkit-scrollbar{width:8px;}
  #overlay::-webkit-scrollbar-thumb{background:rgba(240,192,90,.35);border-radius:8px;}
  .panel{background:var(--glass);border:1px solid var(--line);border-radius:22px;
    padding:clamp(12px,2.2vw,26px) clamp(22px,4.4vw,50px);text-align:center;color:var(--txt);
    box-shadow:0 20px 60px rgba(0,0,0,.6);max-width:min(92vw,540px);
    margin:auto;animation:popin .25s ease;}
  .title{font-size:clamp(26px,4.8vw,46px);font-weight:900;letter-spacing:.16em;margin:0 0 1px;
    padding-left:.16em;white-space:nowrap;background:linear-gradient(180deg,#ffe9a8,#e9a93c 60%,#a86d12);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 3px 10px rgba(240,192,90,.35));}
  .sub{letter-spacing:.42em;padding-left:.42em;font-size:clamp(9px,1.5vw,12px);

<script>
'use strict';
/* =========================================================
   WILDKEEP — premium browser tower defense (prototype v1)
   Single file · Canvas 2D · HD (devicePixelRatio) · WebAudio
   ========================================================= */

// ---------- core constants & helpers ----------
const W = 1280, H = 720, TAU = Math.PI * 2;
const RES = Math.min(2, window.devicePixelRatio || 1);
const rand  = (a, b) => a + Math.random() * (b - a);
const irand = (a, b) => Math.floor(rand(a, b + 1));
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp  = (a, b, t) => a + (b - a) * t;
const dist  = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);
function angLerp(a, b, t){
  let d = (b - a) % TAU;
  if (d >  Math.PI) d -= TAU;
  if (d < -Math.PI) d += TAU;
  return a + d * t;
}

const stage = document.getElementById('stage');
const bg = document.getElementById('bg'), cv = document.getElementById('cv');
for (const c of [bg, cv]) { c.width = W * RES; c.height = H * RES; }
const bctx = bg.getContext('2d'), ctx = cv.getContext('2d');
bctx.scale(RES, RES); ctx.scale(RES, RES);

// ---------- audio (tiny synth engine) ----------
let audioOn = true, AC = null, noiseBuf = null;
function ac(){
  try{
    if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
    if (AC.state === 'suspended') AC.resume();
    return AC;
  }catch(e){ return null; }
}
function tone(f0, f1, dur, type = 'square', vol = .06, delay = 0){
  if (!audioOn) return; const a = ac(); if (!a) return;
  const t = a.currentTime + delay;
  const o = a.createOscillator(), g = a.createGain();
  o.type = type;
  o.frequency.setValueAtTime(Math.max(1, f0), t);
  o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(.0001, t + dur);
  o.connect(g).connect(a.destination);
  o.start(t); o.stop(t + dur + .02);
}
function noise(dur, vol = .1, fc = 800, delay = 0){
  if (!audioOn) return; const a = ac(); if (!a) return;
  if (!noiseBuf){
    noiseBuf = a.createBuffer(1, a.sampleRate * .5, a.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  }
  const t = a.currentTime + delay;
  const s = a.createBufferSource(); s.buffer = noiseBuf;
  const f = a.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = fc;
  const g = a.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(.0001, t + dur);
  s.connect(f).connect(g).connect(a.destination);
  s.start(t); s.stop(t + dur + .02);
}
const SND = {
  shoot : () => tone(880, 420, .07, 'triangle', .035),
  frost : () => tone(1250, 320, .14, 'sine', .05),
  cannon: () => { noise(.22, .22, 480); tone(130, 45, .2, 'sine', .18); },
  zap   : () => { tone(1700, 190, .1, 'sawtooth', .05); noise(.05, .06, 5000); },
  coin  : () => { tone(920, 920, .05, 'square', .04); tone(1380, 1380, .07, 'square', .04, .05); },
  place : () => { tone(300, 520, .1, 'triangle', .06); noise(.08, .08, 300); },
  upg   : () => { tone(560, 1150, .13, 'triangle', .07); tone(840, 1680, .13, 'triangle', .05, .06); },
  sell  : () => tone(520, 240, .13, 'triangle', .06),
  die   : () => noise(.07, .05, 1400),
  leak  : () => tone(230, 70, .3, 'sawtooth', .12),
  wave  : () => { tone(523,523,.09,'square',.05); tone(659,659,.09,'square',.06,.09); tone(784,784,.16,'square',.07,.18); },
  clear : () => { tone(659,659,.08,'triangle',.06); tone(880,880,.14,'triangle',.07,.08); },
  win   : () => { [523,659,784,1047].forEach((f,i)=>tone(f,f,.18,'triangle',.08,i*.12)); },
  over  : () => tone(380, 90, .7, 'sawtooth', .11),
};

// ---------- procedural music ----------
const BEAT = 60 / 96; // 96 BPM, chill fantasy loop
const PROG = [
  { pad:[57,60,64], bass:45 },  // Am
  { pad:[57,60,65], bass:41 },  // F
  { pad:[55,60,64], bass:48 },  // C
  { pad:[55,59,62], bass:43 },  // G
];
const music = { started:false, beat:0, next:0, iv:null, gain:null };
const mfreq = m => 440 * Math.pow(2, (m - 69) / 12);
function getNoise(a){
  if (!noiseBuf){
    noiseBuf = a.createBuffer(1, a.sampleRate * .5, a.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  }
  return noiseBuf;
}
function mnote(midi, t, dur, type = 'triangle', vol = .04, det = 0){
  if (!audioOn || !music.gain || !AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = mfreq(midi); if (det) o.detune.value = det;
  g.gain.setValueAtTime(.0001, t);
  g.gain.linearRampToValueAtTime(vol, t + Math.min(.05, dur * .3));
  g.gain.exponentialRampToValueAtTime(.0001, t + dur);
  o.connect(g).connect(music.gain);
  o.start(t); o.stop(t + dur + .05);
}
function mkick(t){
  if (!audioOn || !music.gain || !AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(135, t); o.frequency.exponentialRampToValueAtTime(44, t + .1);
  g.gain.setValueAtTime(.12, t); g.gain.exponentialRampToValueAtTime(.0001, t + .15);
  o.connect(g).connect(music.gain); o.start(t); o.stop(t + .2);
}
function mhat(t){
  if (!audioOn || !music.gain || !AC) return;
  const s = AC.createBufferSource(); s.buffer = getNoise(AC);
  const f = AC.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 7500;
  const g = AC.createGain();
  g.gain.setValueAtTime(.018, t); g.gain.exponentialRampToValueAtTime(.0001, t + .045);
  s.connect(f).connect(g).connect(music.gain); s.start(t); s.stop(t + .07);
}
function scheduleBeat(b, t){
  const ch = PROG[Math.floor(b / 4) % PROG.length];
  if (b % 4 === 0){ // sustained pad chord, softly detuned
    for (const m of ch.pad){ mnote(m, t, BEAT*3.9, 'triangle', .019); mnote(m, t, BEAT*3.9, 'triangle', .011, 9); }
  }
  if (b % 2 === 0) mnote(ch.bass, t, BEAT*.9, 'sine', .085);
  for (let h = 0; h < 2; h++){ // gentle arpeggio, chord tones only
    const tt = t + h * BEAT / 2;
    if (Math.random() < .6) mnote(ch.pad[irand(0, 2)] + 12, tt, BEAT*.42, 'triangle', .03);
  }
  if (state === 'wave'){ // combat drums fade in with the action
    if (b % 2 === 0) mkick(t);
    mhat(t);
    if (Math.random() < .8) mhat(t + BEAT / 2);
  }
}
function startMusic(){
  const a = ac(); if (!a || music.started) return;
  music.started = true;
  music.gain = a.createGain(); music.gain.gain.value = 1; music.gain.connect(a.destination);
  music.next = a.currentTime + .15; music.beat = 0;
  music.iv = setInterval(() => {
    if (!AC) return;
    while (music.next < AC.currentTime + 1.3){
      scheduleBeat(music.beat, music.next);
      music.beat++; music.next += BEAT;
    }
  }, 250);
}

// ---------- path (organic Catmull-Rom spline) ----------
const RAW = [
  [-60,150],[170,150],[330,230],[395,365],[310,480],[350,585],[520,610],
  [665,520],[660,370],[770,255],[950,225],[1070,320],[1035,470],[1150,565],[1340,600]
];
function catmull(p0, p1, p2, p3, t){
  const t2 = t*t, t3 = t2*t;
  return [
    .5*((2*p1[0]) + (-p0[0]+p2[0])*t + (2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2 + (-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3),
    .5*((2*p1[1]) + (-p0[1]+p2[1])*t + (2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2 + (-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3)
  ];
}
const PTS = []; let TOTAL = 0;
(function buildPath(){
  const raw = [];
  for (let i = 0; i < RAW.length - 1; i++){
    const p0 = RAW[Math.max(0, i-1)], p1 = RAW[i], p2 = RAW[i+1], p3 = RAW[Math.min(RAW.length-1, i+2)];
    const steps = 24;
    for (let s = (i === 0 ? 0 : 1); s <= steps; s++) raw.push(catmull(p0, p1, p2, p3, s/steps));
  }
  let d = 0;
  for (let i = 0; i < raw.length; i++){
    if (i > 0) d += dist(raw[i-1][0], raw[i-1][1], raw[i][0], raw[i][1]);
    PTS.push({ x: raw[i][0], y: raw[i][1], d });
  }
  TOTAL = d;
})();
function pointAt(d){
  d = clamp(d, 0, TOTAL - .01);
  let lo = 0, hi = PTS.length - 1;
  while (lo < hi - 1){ const m = (lo + hi) >> 1; (PTS[m].d <= d) ? lo = m : hi = m; }
  const a = PTS[lo], b = PTS[hi], t = (d - a.d) / Math.max(.0001, b.d - a.d);
  return { x: lerp(a.x, b.x, t), y: lerp(a.y, b.y, t), a: Math.atan2(b.y - a.y, b.x - a.x) };
}
function distToPath(x, y){
  let m = 1e9;
  for (let i = 0; i < PTS.length; i += 2){
    const dx = PTS[i].x - x, dy = PTS[i].y - y, dd = dx*dx + dy*dy;
    if (dd < m) m = dd;
  }
  return Math.sqrt(m);
}

// ---------- decorations ----------
const POND = { x: 1185, y: 128, r: 66 };
let trees = [], rocks = [], flowers = [], tufts = [];
function genDecor(){
  trees = []; rocks = []; flowers = []; tufts = [];
  let tries = 0;
  while (trees.length < 11 && tries++ < 500){
    const x = rand(45, 1235), y = rand(60, 640);
    if (distToPath(x, y) < 80) continue;
    if (dist(x, y, POND.x, POND.y) < POND.r + 44) continue;
    if (trees.some(t => dist(x, y, t.x, t.y) < 62)) continue;
    trees.push({ x, y, r: rand(17, 25), hue: irand(0, 2), seed: rand(0, TAU) });
  }
  tries = 0;
  while (rocks.length < 7 && tries++ < 300){
    const x = rand(40, 1240), y = rand(60, 645);
    if (distToPath(x, y) < 58 || dist(x, y, POND.x, POND.y) < POND.r + 22) continue;
    if (trees.some(t => dist(x, y, t.x, t.y) < 46)) continue;
    rocks.push({ x, y, r: rand(7, 14), a: rand(0, TAU) });
  }
  for (let i = 0; i < 30; i++){
    const x = rand(30, 1250), y = rand(55, 655);
    if (distToPath(x, y) < 42 || dist(x, y, POND.x, POND.y) < POND.r + 12) continue;
    flowers.push({ x, y, c: ['#fff6d8','#ffd6e0','#ffe98a','#e8d5ff'][irand(0,3)] });
  }
  for (let i = 0; i < 46; i++){
    const x = rand(25, 1255), y = rand(55, 660);
    if (distToPath(x, y) < 38 || dist(x, y, POND.x, POND.y) < POND.r + 10) continue;
    tufts.push({ x, y, s: rand(3, 6) });
  }
}

// ---------- scored placement spots (for advisor) ----------
let SPOTS = [];
function genSpots(){
  SPOTS = [];
  for (let d = 60; d < TOTAL - 60; d += 90){
    const p = pointAt(d);
    for (const side of [1, -1]){
      for (const off of [72, 100]){
        const x = p.x + Math.cos(p.a + Math.PI/2) * off * side;
        const y = p.y + Math.sin(p.a + Math.PI/2) * off * side;
        if (x < 40 || x > 1240 || y < 78 || y > 592) continue;
        let cov = 0;
        for (let i = 0; i < PTS.length; i += 3)
          if (dist(x, y, PTS[i].x, PTS[i].y) <= 150) cov++;
        SPOTS.push({ x, y, cov });
      }
    }
  }
  SPOTS.sort((a, b) => b.cov - a.cov);
}
function bestSpot(){
  for (const s of SPOTS) if (canPlace(s.x, s.y)) return s;
  return null;
}

// ---------- static background painter ----------
function drawBackground(){
  const g = bctx;
  g.clearRect(0, 0, W, H);

  // meadow base
  const gr = g.createLinearGradient(0, 0, 0, H);
  gr.addColorStop(0, '#83bd60'); gr.addColorStop(.55, '#6fae52'); gr.addColorStop(1, '#5c9c46');
  g.fillStyle = gr; g.fillRect(0, 0, W, H);

  // sun glow
  const sun = g.createRadialGradient(180, 90, 20, 180, 90, 520);
  sun.addColorStop(0, 'rgba(255,244,200,.14)'); sun.addColorStop(1, 'rgba(255,244,200,0)');
  g.fillStyle = sun; g.fillRect(0, 0, W, H);

  // organic mottling
  for (let i = 0; i < 110; i++){
    const x = rand(0, W), y = rand(0, H), r = rand(18, 70);
    const m = g.createRadialGradient(x, y, 0, x, y, r);
    const dark = Math.random() < .5;
    m.addColorStop(0, dark ? 'rgba(52,96,44,.10)' : 'rgba(160,214,120,.10)');
    m.addColorStop(1, 'rgba(0,0,0,0)');
    g.fillStyle = m; g.beginPath(); g.arc(x, y, r, 0, TAU); g.fill();
  }

  // pond
  g.save();
  g.beginPath(); g.ellipse(POND.x, POND.y, POND.r + 10, POND.r * .82 + 8, 0, 0, TAU);
  g.fillStyle = '#c9b881'; g.fill();
  const wg = g.createRadialGradient(POND.x - 14, POND.y - 12, 6, POND.x, POND.y, POND.r);
  wg.addColorStop(0, '#7cc7ea'); wg.addColorStop(.6, '#3f95cc'); wg.addColorStop(1, '#2b6ea3');
  g.beginPath(); g.ellipse(POND.x, POND.y, POND.r, POND.r * .8, 0, 0, TAU);
  g.fillStyle = wg; g.fill();
  g.strokeStyle = 'rgba(226,245,255,.5)'; g.lineWidth = 2; g.stroke();
  for (let i = 0; i < 3; i++){ // lily pads
    const a = rand(0, TAU), rr = rand(POND.r*.25, POND.r*.6);
    const lx = POND.x + Math.cos(a)*rr, ly = POND.y + Math.sin(a)*rr*.8;
    g.fillStyle = '#5ea44b';
    g.beginPath(); g.ellipse(lx, ly, 9, 6.5, a, .25, TAU - .25); g.lineTo(lx, ly); g.fill();
  }
  g.restore();

  // path — layered strokes along the spline
  g.lineJoin = 'round'; g.lineCap = 'round';
  const trace = () => { g.beginPath(); g.moveTo(PTS[0].x, PTS[0].y);
    for (let i = 1; i < PTS.length; i++) g.lineTo(PTS[i].x, PTS[i].y); };
  trace(); g.strokeStyle = 'rgba(40,60,30,.35)'; g.lineWidth = 60; g.stroke(); // soft shadow edge
  trace(); g.strokeStyle = '#8f6a44'; g.lineWidth = 54; g.stroke();            // dark rim
  trace(); g.strokeStyle = '#d3ab77'; g.lineWidth = 46; g.stroke();            // dirt
  trace(); g.strokeStyle = 'rgba(233,199,148,.85)'; g.lineWidth = 18; g.stroke(); // worn center
  // pebbles
  for (let d = 24; d < TOTAL - 24; d += 30){
    const p = pointAt(d + rand(-8, 8)), off = rand(-15, 15);
    const px = p.x + Math.cos(p.a + Math.PI/2) * off, py = p.y + Math.sin(p.a + Math.PI/2) * off;
    g.fillStyle = Math.random() < .5 ? 'rgba(168,132,92,.55)' : 'rgba(226,196,152,.6)';
    g.beginPath(); g.ellipse(px, py, rand(1.6, 3.4), rand(1.2, 2.4), rand(0, TAU), 0, TAU); g.fill();
  }

  // spawn cave (start of path)
  const sp = pointAt(6);
  g.save(); g.translate(sp.x + 4, sp.y);
  g.fillStyle = '#5d5347';
  g.beginPath(); g.ellipse(0, -6, 40, 34, 0, Math.PI, 0); g.fill();
  g.fillStyle = '#171310';
  g.beginPath(); g.ellipse(0, 2, 26, 22, 0, Math.PI, 0); g.fill();
  g.fillStyle = '#6e6254';
  for (let i = 0; i < 5; i++){
    const a = Math.PI + i * (Math.PI/4.4) + .25;
    g.beginPath(); g.arc(Math.cos(a)*33, -6 + Math.sin(a)*28, 6.5, 0, TAU); g.fill();
  }
  g.restore();

  // stone keep (end of path)
  const kp = pointAt(TOTAL - 30);
  g.save(); g.translate(kp.x + 8, kp.y - 6);
  g.fillStyle = 'rgba(0,0,0,.25)'; g.beginPath(); g.ellipse(0, 30, 52, 13, 0, 0, TAU); g.fill();
  const stone = g.createLinearGradient(0, -60, 0, 30);
  stone.addColorStop(0, '#cfc8b8'); stone.addColorStop(1, '#948c7b');
  g.fillStyle = stone; g.strokeStyle = '#4c463c'; g.lineWidth = 2.5;
  g.fillRect(-30, -34, 60, 62); g.strokeRect(-30, -34, 60, 62);          // main wall
  g.fillRect(-46, -52, 22, 80); g.strokeRect(-46, -52, 22, 80);          // left tower
  g.fillRect(24, -52, 22, 80);  g.strokeRect(24, -52, 22, 80);           // right tower
  for (const tx of [-46, 24]) for (let i = 0; i < 3; i++){               // crenellations
    g.fillRect(tx + i*8, -58, 6, 8); g.strokeRect(tx + i*8, -58, 6, 8);
  }
  g.fillStyle = '#241b12';
  g.beginPath(); g.moveTo(-13, 28); g.lineTo(-13, 2); g.arc(0, 2, 13, Math.PI, 0); g.lineTo(13, 28); g.fill(); // gate
  g.strokeStyle = '#6e6254'; g.lineWidth = 1.4;
  for (let i = 1; i < 4; i++){ g.beginPath(); g.moveTo(-13, 28 - i*7); g.lineTo(13, 28 - i*7); g.stroke(); }
  g.strokeStyle = '#4c463c'; g.lineWidth = 3;                            // flag
  g.beginPath(); g.moveTo(0, -34); g.lineTo(0, -62); g.stroke();
  g.fillStyle = '#e05548';
  g.beginPath(); g.moveTo(0, -62); g.lineTo(22, -56); g.lineTo(0, -50); g.fill();
  g.restore();

  // rocks
  for (const r of rocks){
    g.save(); g.translate(r.x, r.y); g.rotate(r.a);
    g.fillStyle = 'rgba(0,0,0,.18)'; g.beginPath(); g.ellipse(1, r.r*.55, r.r*1.1, r.r*.45, 0, 0, TAU); g.fill();
    const rg = g.createLinearGradient(-r.r, -r.r, r.r, r.r);
    rg.addColorStop(0, '#aab0b6'); rg.addColorStop(1, '#6f757b');
    g.fillStyle = rg; g.strokeStyle = '#565b60'; g.lineWidth = 1.5;
    g.beginPath();
    g.moveTo(-r.r, r.r*.4); g.lineTo(-r.r*.6, -r.r*.7); g.lineTo(r.r*.3, -r.r);
    g.lineTo(r.r, -r.r*.1); g.lineTo(r.r*.6, r.r*.55); g.closePath(); g.fill(); g.stroke();
    g.strokeStyle = 'rgba(255,255,255,.35)'; g.lineWidth = 1.2;
    g.beginPath(); g.moveTo(-r.r*.55, -r.r*.6); g.lineTo(r.r*.25, -r.r*.9); g.stroke();
    g.restore();
  }

  // grass tufts & flowers
  for (const t of tufts){
    g.strokeStyle = 'rgba(46,92,38,.55)'; g.lineWidth = 1.4;
    for (let i = -1; i <= 1; i++){
      g.beginPath(); g.moveTo(t.x, t.y);
      g.quadraticCurveTo(t.x + i*2, t.y - t.s, t.x + i*3, t.y - t.s*1.7); g.stroke();
    }
  }
  for (const f of flowers){
    g.fillStyle = f.c;
    for (let i = 0; i < 4; i++){
      const a = i * Math.PI/2 + .5;
      g.beginPath(); g.arc(f.x + Math.cos(a)*2.4, f.y + Math.sin(a)*2.4, 1.9, 0, TAU); g.fill();
    }
    g.fillStyle = '#e9a93c'; g.beginPath(); g.arc(f.x, f.y, 1.5, 0, TAU); g.fill();
  }

  // trees (canopy clusters + trunk hint + shadow)
  const PAL = [['#3e7a3a','#4f9247','#66aa58'], ['#356e3d','#47884b','#5da45c'], ['#4a833b','#5b9a49','#74b45e']];
  for (const t of trees){
    g.fillStyle = 'rgba(0,0,0,.20)';
    g.beginPath(); g.ellipse(t.x + 4, t.y + t.r*.85, t.r*1.25, t.r*.45, 0, 0, TAU); g.fill();
    g.fillStyle = '#7a5636'; g.fillRect(t.x - 2.5, t.y + t.r*.25, 5, t.r*.5);
    const [c1, c2, c3] = PAL[t.hue];
    const blob = (bx, by, br, col) => { g.fillStyle = col; g.beginPath(); g.arc(bx, by, br, 0, TAU); g.fill(); };
    blob(t.x - t.r*.5, t.y - t.r*.15, t.r*.72, c1);
    blob(t.x + t.r*.5, t.y - t.r*.1, t.r*.68, c1);
    blob(t.x, t.y - t.r*.55, t.r*.8, c2);
    blob(t.x - t.r*.25, t.y - t.r*.65, t.r*.45, c3);
    g.fillStyle = 'rgba(255,255,230,.16)';
    g.beginPath(); g.arc(t.x - t.r*.35, t.y - t.r*.8, t.r*.3, 0, TAU); g.fill();
  }

  // vignette
  const v = g.createRadialGradient(W/2, H/2, H*.45, W/2, H/2, H*.95);
  v.addColorStop(0, 'rgba(0,0,0,0)'); v.addColorStop(1, 'rgba(6,14,8,.34)');
  g.fillStyle = v; g.fillRect(0, 0, W, H);
}

  tesla:  { name:'TESLA',  cost:300, upg:[240,400], dmg:[60,100,165], rate:[1.15,1,.85],   range:[165,178,192], chain:[3,4,5], desc:'Chain lightning' },

const TKEYS = ['archer','frost','cannon','tesla'];

const clouds = [ { x:rand(0,W), y:rand(60,300), r:220, v:9 }, { x:rand(0,W), y:rand(300,600), r:280, v:6 } ];

// ---------- engagement systems: abilities, combo, focus, enemy traits ----------
let score = 0, combo = 0, comboT = 0, bestCombo = 0;
let focusEnemy = null, aiming = null, rageT = 0, freezeFxT = 0;
let pending = [];                       // enemies to add after the update pass (splitters)
const ABIL = {
  meteor: { name:'Meteor', hot:'Q', icon:'☄', cd:0, max:16, aim:true },
  freeze: { name:'Freeze', hot:'W', icon:'❄', cd:0, max:20 },
  rage:   { name:'Rally',  hot:'E', icon:'🔥', cd:0, max:24 },
};
const AKEYS = ['meteor','freeze','rage'];
function comboMult(){ return 1 + Math.min(2, Math.floor(combo / 5) * .5); }   // x1 → x3
function canHit(type, e){ return !(type === 'cannon' && e.fly); }            // cannonballs pass under flyers
function addKill(e){
  const mult = comboMult();
  const g = Math.round(e.gold * mult);
  gold += g; score += Math.round((e.score || e.gold) * 10 * mult);
  combo++; comboT = 2.6; if (combo > bestCombo) bestCombo = combo;
  const p = pointAt(e.dist);
  addText(p.x, p.y - e.r - 8, '+' + g + (mult > 1 ? '  x' + mult : ''));
}
function useAbility(k){
  const a = ABIL[k]; if (!a || a.cd > 0 || state !== 'wave') return;
  if (k === 'meteor'){ aiming = 'meteor'; stage.classList.add('placing'); closePop(); return; }
  if (k === 'freeze'){
    for (const e of enemies) applySlow(e, .12, 3);
    freezeFxT = 3; a.cd = a.max; SND.frost();
    fx.push({ kind:'flash', x:W/2, y:H/2, r:900, life:.4, maxL:.4, col:'170,225,255' });
    showBanner('❄ FREEZE', 'The horde is locked in ice');
  } else if (k === 'rage'){
    rageT = 6; a.cd = a.max; SND.upg();
    showBanner('🔥 RALLY', 'Every tower empowered');
  }
}
function castMeteor(x, y){
  const a = ABIL.meteor; a.cd = a.max; aiming = null; stage.classList.remove('placing');
  const R = 130, DMG = 200 + wave * 12;
  fx.push({ kind:'flash', x, y, r:R*1.25, life:.32, maxL:.32, col:'255,150,60' });
  boom(x, y, R); shake = Math.max(shake, 9);
  spark(x, y, '255,120,40', 26, 240, .6, 6, 120);
  for (const e of enemies){
    if (e.dead) continue;
    const p = pointAt(e.dist), d = dist(x, y, p.x, p.y);
    if (d <= R) damageEnemy(e, Math.round(DMG * (1 - .4 * d / R)));
  }
  SND.cannon();
}

// ---------- entity helpers ----------
function showBanner(txt, sub = '', dur = 1.9){ banner.txt = txt; banner.sub = sub; banner.t = dur; banner.max = dur; }
function addText(x, y, txt, col = '#ffd76a', size = 15){ texts.push({ x, y, txt, col, size, life:.9, max:.9 }); }

function makeEnemy(type, mods = {}){
  const d = EDEF[type];
  const hp = Math.round(d.hp * hpMult(wave) * (mods.hpF || 1));
  const e = {
    type, r: d.r * (mods.rF || 1),
    hp, maxHp: hp,
    spd: d.spd * spdMult(wave) * (mods.spdF || 1),
    gold: Math.round((d.gold + Math.floor(wave/4) * (type==='boss'?4:1)) * (mods.goldF || 1)),
    dmgL: d.dmgL, dist: mods.dist || 0, slowT: 0, slowF: 1, seed: rand(0,TAU), age: 0, flash: 0, dead: false,
    // traits
    shield: 0, maxShield: 0, split: !!mods.split, heal: !!mods.heal, fly: !!mods.fly, healT: rand(0,1),
  };
  e.score = e.gold;
  if (mods.shield){ e.maxShield = Math.round(hp * mods.shield); e.shield = e.maxShield; }
  return e;
}
function buildQueue(w){
  const q = [];
  const gob = 5 + Math.floor(w * 1.5);
  const run = w >= 2 ? 1 + Math.floor((w-1) * 1.0) : 0;
  const bru = w >= 4 ? Math.floor((w-2) / 1.8) : 0;
  for (let i = 0; i < gob; i++) q.push({ type:'goblin', gap: Math.max(.42, .78 - w*.012) });
  for (let i = 0; i < run; i++) q.push({ type:'runner', gap:.55 });
  for (let i = 0; i < bru; i++) q.push({ type:'brute',  gap:1.15 });
  // ---- special enemies with traits (ramp in over the waves) ----
  const flyers   = w >= 6 ? 2 + Math.floor((w-6)/2) : 0;   // dodge cannons
  const splitters= w >= 5 ? 1 + Math.floor((w-5)/3) : 0;   // split on death
  const healers  = w >= 7 ? 1 + Math.floor((w-7)/4) : 0;   // heal the pack
  for (let i = 0; i < flyers; i++)    q.push({ type:'runner', mods:{ fly:true, hpF:.9, goldF:1.4 }, gap:.6 });
  for (let i = 0; i < splitters; i++) q.push({ type:'brute',  mods:{ split:true, hpF:.7, rF:.9, goldF:1.2 }, gap:1.1 });
  for (let i = 0; i < healers; i++)   q.push({ type:'goblin', mods:{ heal:true, hpF:1.6, rF:1.25, spdF:.8, goldF:1.6 }, gap:1 });
  // shielded goblins from wave 3
  if (w >= 3){ const sh = 2 + Math.floor(w/3); for (let i = 0; i < sh; i++) q.push({ type:'goblin', mods:{ shield:.8, goldF:1.3 }, gap:.5 }); }
  for (let i = q.length - 1; i > 0; i--){ const j = irand(0, i); [q[i], q[j]] = [q[j], q[i]]; }
  if (w % 5 === 0) for (let i = 0; i < (w >= FINAL ? 2 : 1); i++) q.push({ type:'boss', mods:{ shield:.5 }, gap:1.6 });
  return q;
}

function damageEnemy(e, dmg){
  if (e.dead) return;
  if (e.shield > 0){                       // shield soaks damage first
    const a = Math.min(e.shield, dmg); e.shield -= a; dmg -= a;
    e.flash = .09;
    if (dmg <= 0) return;
  }
  e.hp -= dmg; e.flash = .09;
  if (e.hp <= 0){
    e.dead = true;
    const p = pointAt(e.dist);
    addKill(e);
    deathBurst(p.x, p.y, e);
    SND.die(); SND.coin();
    if (e === focusEnemy) focusEnemy = null;
    if (e.split){                          // splitter bursts into two runts
      for (let k = 0; k < 2; k++){
        const c = makeEnemy('goblin', { dist: clamp(e.dist + rand(-14, 14), 0, TOTAL - 1), hpF:.55, rF:.85, goldF:.4, spdF:1.15 });
        pending.push(c);
      }
    }
  }
}
function applySlow(e, f, dur){ if (f < e.slowF || e.slowT <= 0) e.slowF = f; e.slowT = Math.max(e.slowT, dur); }

// ---------- particles & effects ----------
function spark(x, y, col, n, spd, life, size, g = 60){
  for (let i = 0; i < n; i++){
    const a = rand(0, TAU), v = rand(spd*.3, spd);
    parts.push({ x, y, vx:Math.cos(a)*v, vy:Math.sin(a)*v, g, life:rand(life*.6, life), max:life, size:rand(size*.5, size), col, mode:'spark' });
  }
}
function smoke(x, y, n){
  for (let i = 0; i < n; i++)
    parts.push({ x:x+rand(-6,6), y:y+rand(-6,6), vx:rand(-14,14), vy:rand(-30,-8), g:-8,
      life:rand(.5,.9), max:.9, size:rand(5,10), col:'120,120,120', mode:'smoke' });
}
function deathBurst(x, y, e){
  const col = e.type==='boss' ? '182,120,255' : e.type==='brute' ? '196,120,86' : e.type==='runner' ? '170,180,190' : '120,200,90';
  spark(x, y, col, e.type==='boss'?22:10, e.type==='boss'?170:110, .55, 4, 120);
  fx.push({ kind:'ring', x, y, r:6, max:e.r*2.2, life:.35, maxL:.35, col:'255,255,255' });
  if (e.type === 'boss'){ shake = Math.max(shake, 7); fx.push({ kind:'flash', x, y, r:e.r*3, life:.25, maxL:.25, col:'200,150,255' }); }
}
function boom(x, y, radius){
  fx.push({ kind:'flash', x, y, r:radius*.9, life:.18, maxL:.18, col:'255,190,90' });
  fx.push({ kind:'ring',  x, y, r:8, max:radius*1.15, life:.32, maxL:.32, col:'255,205,120' });
  spark(x, y, '255,170,60', 16, 190, .5, 4.5, 150);
  spark(x, y, '255,230,140', 8, 130, .35, 3, 100);
  smoke(x, y, 6);
  shake = Math.max(shake, 3.5);
}
function frostBurst(x, y){
  fx.push({ kind:'ring', x, y, r:4, max:34, life:.3, maxL:.3, col:'170,225,255' });
  spark(x, y, '190,235,255', 7, 90, .4, 3, 40);
}
function jagged(x1, y1, x2, y2){
  const pts = [[x1, y1]];
  const segs = Math.max(3, Math.floor(dist(x1,y1,x2,y2) / 26));
  for (let i = 1; i < segs; i++){
    const t = i / segs, nx = lerp(x1,x2,t), ny = lerp(y1,y2,t);
    const a = Math.atan2(y2-y1, x2-x1) + Math.PI/2, off = rand(-9, 9);
    pts.push([nx + Math.cos(a)*off, ny + Math.sin(a)*off]);
  }
  pts.push([x2, y2]);
  return pts;
}

// ---------- towers ----------
function towerAt(x, y){ return towers.find(t => dist(x, y, t.x, t.y) < 25); }
function canPlace(x, y){
  if (x < 30 || x > 1250 || y < 70 || y > 600) return false;
  if (distToPath(x, y) < 48) return false;
  if (dist(x, y, POND.x, POND.y) < POND.r + 24) return false;
  if (trees.some(t => dist(x, y, t.x, t.y) < 40)) return false;
  if (towers.some(t => dist(x, y, t.x, t.y) < 42)) return false;
  return true;
}
function placeTower(key, x, y){
  const d = TDEF[key];
  towers.push({ type:key, x, y, lvl:1, cd:rand(0,.2), angle:rand(0,TAU), flash:0, recoil:0, spent:d.cost, sparkT:rand(0,2), prio:'first' });
  gold -= d.cost;
  SND.place();
  spark(x, y, '230,220,190', 8, 80, .4, 3, 90);
  fx.push({ kind:'ring', x, y, r:6, max:34, life:.3, maxL:.3, col:'240,220,160' });
}
function tStat(t, key){ return TDEF[t.type][key][t.lvl - 1]; }

function fireTower(t, target){
  const d = TDEF[t.type];
  t.flash = .09;
  const s = 1 + (t.lvl - 1) * .1;
  const rageMul = rageT > 0 ? 1.6 : 1;
  if (t.type === 'tesla'){
    const hit = [target]; let dmg = tStat(t,'dmg') * rageMul;
    let last = target;
    const maxChain = d.chain[t.lvl-1];
    while (hit.length < maxChain){
      const lp = pointAt(last.dist);
      let best = null, bd = 1e9;
      for (const e of enemies){
        if (e.dead || hit.includes(e)) continue;
        const ep = pointAt(e.dist), dd = dist(lp.x, lp.y, ep.x, ep.y);
        if (dd < 120 && dd < bd){ bd = dd; best = e; }
      }
      if (!best) break;
      hit.push(best); last = best;
    }
    const chainPts = [[t.x, t.y - 27*s]];
    for (const e of hit){
      const p = pointAt(e.dist);
      chainPts.push([p.x, p.y - e.r*.4]);
      damageEnemy(e, Math.round(dmg));
      spark(p.x, p.y, '255,235,140', 4, 70, .25, 2.5, 30);
      dmg *= .7;
    }
    for (let i = 0; i < chainPts.length - 1; i++)
      fx.push({ kind:'bolt', pts: jagged(...chainPts[i], ...chainPts[i+1]), life:.16, maxL:.16 });
    SND.zap();
    return;
  }
  // projectile towers
  let ox, oy;
  if (t.type === 'frost'){ ox = t.x; oy = t.y - 20*s; }
  else { const len = t.type === 'cannon' ? 24*s : 16*s; ox = t.x + Math.cos(t.angle)*len; oy = t.y + Math.sin(t.angle)*len; }
  const spd = t.type === 'archer' ? 560 : t.type === 'cannon' ? 300 : 380;
  projs.push({ type:t.type, x:ox, y:oy, tgt:target, lx:ox, ly:oy, spd,
    dmg:tStat(t,'dmg') * rageMul,
    splash: d.splash ? d.splash[t.lvl-1] : 0,
    slow: d.slow ? d.slow[t.lvl-1] : 0, slowDur: d.slowDur || 0,
    trail: 0 });
  if (t.type === 'cannon'){ t.recoil = 6; SND.cannon(); smoke(ox, oy, 2); }
  else if (t.type === 'frost') SND.frost();
  else SND.shoot();
}

// ---------- updates ----------
function updateCombat(dt){
  // ability cooldowns & timers (real progression tied to game speed)
  for (const k of AKEYS){ if (ABIL[k].cd > 0) ABIL[k].cd = Math.max(0, ABIL[k].cd - dt); }
  if (rageT > 0) rageT -= dt;
  if (freezeFxT > 0) freezeFxT -= dt;
  if (comboT > 0){ comboT -= dt; if (comboT <= 0) combo = 0; }
  if (focusEnemy && focusEnemy.dead) focusEnemy = null;
  // spawning
  if (state === 'wave' && spawnQ.length){
    spawnT -= dt;
    if (spawnT <= 0){
      const it = spawnQ.shift();
      enemies.push(makeEnemy(it.type, it.mods));
      spawnT = it.gap;
      if (it.type === 'boss'){ showBanner('⚠ BOSS', 'A massive foe approaches'); SND.wave(); }
    }
  }
  // enemies
  for (const e of enemies){
    if (e.dead) continue;
    e.age += dt; e.flash -= dt;
    if (e.slowT > 0){ e.slowT -= dt; if (e.slowT <= 0) e.slowF = 1; }
    e.dist += e.spd * (e.slowT > 0 ? e.slowF : 1) * dt;
    if (e.heal){                          // healers mend the pack around them
      e.healT -= dt;
      if (e.healT <= 0){
        e.healT = 1.3; const hp0 = pointAt(e.dist);
        for (const o of enemies){
          if (o === e || o.dead || o.hp >= o.maxHp) continue;
          const op = pointAt(o.dist);
          if (dist(hp0.x, hp0.y, op.x, op.y) < 140){ o.hp = Math.min(o.maxHp, o.hp + o.maxHp * .12); o.flash = .06; }
        }
        fx.push({ kind:'ring', x:hp0.x, y:hp0.y, r:6, max:140, life:.5, maxL:.5, col:'120,240,150' });
      }
    }
    if (e.dist >= TOTAL){
      e.dead = true;
      lives -= e.dmgL; flashRed = .55; shake = Math.max(shake, 4);
      combo = 0; comboT = 0;              // a leak breaks your streak
      if (e === focusEnemy) focusEnemy = null;
      SND.leak();
      const lp = document.getElementById('lifePill');
      lp.classList.remove('hurt'); void lp.offsetWidth; lp.classList.add('hurt');
      if (lives <= 0 && state !== 'over'){ lives = 0; gameOver(); }
    } else if (Math.random() < dt * 2.2){
      const p = pointAt(e.dist);
      parts.push({ x:p.x+rand(-5,5), y:p.y+e.r*.7, vx:rand(-6,6), vy:rand(-14,-4), g:-4,
        life:.4, max:.4, size:rand(2,4), col:'150,122,84', mode:'smoke' });
    }
  }
  enemies = enemies.filter(e => !e.dead);

  // towers
  const rateMul = rageT > 0 ? .62 : 1;
  for (const t of towers){
    t.cd -= dt; t.flash -= dt; t.recoil = Math.max(0, t.recoil - dt*30); t.sparkT -= dt;
    const range = tStat(t, 'range');
    const inRange = e => { const p = pointAt(e.dist); return dist(t.x, t.y, p.x, p.y) <= range; };
    let target = null;
    // player focus-fire wins if that enemy is in range and hittable
    if (focusEnemy && !focusEnemy.dead && canHit(t.type, focusEnemy) && inRange(focusEnemy)) target = focusEnemy;
    if (!target){
      let bestVal = -Infinity;
      for (const e of enemies){
        if (e.dead || !canHit(t.type, e) || !inRange(e)) continue;
        const p = pointAt(e.dist);
        let val;
        switch (t.prio){
          case 'last':   val = -e.dist; break;
          case 'strong': val = e.hp + e.shield; break;
          case 'close':  val = -dist(t.x, t.y, p.x, p.y); break;
          default:       val = e.dist;              // 'first' — furthest along the path
        }
        if (val > bestVal){ bestVal = val; target = e; }
      }
    }
    if (target){
      const p = pointAt(target.dist);
      t.angle = angLerp(t.angle, Math.atan2(p.y - t.y, p.x - t.x), Math.min(1, dt*14));
      if (t.cd <= 0){ fireTower(t, target); t.cd = tStat(t, 'rate') * rateMul; }
    }
    if (t.type === 'tesla' && t.sparkT <= 0){
      t.sparkT = rand(.6, 1.6);
      const s = 1 + (t.lvl-1)*.1, a = rand(0, TAU);
      fx.push({ kind:'bolt', pts: jagged(t.x, t.y - 27*s, t.x + Math.cos(a)*13, t.y - 27*s + Math.sin(a)*13), life:.1, maxL:.1 });
    }
  }

  // projectiles
  for (const pr of projs){
    if (pr.tgt && !pr.tgt.dead){ const p = pointAt(pr.tgt.dist); pr.lx = p.x; pr.ly = p.y - pr.tgt.r*.35; }
    const dx = pr.lx - pr.x, dy = pr.ly - pr.y, dd = Math.hypot(dx, dy);
    const step = pr.spd * dt;
    if (dd <= Math.max(step, 13)){
      // impact
      if (pr.type === 'cannon'){
        boom(pr.lx, pr.ly, pr.splash);
        for (const e of enemies){
          if (e.dead || e.fly) continue;      // cannonballs pass under flyers
          const p = pointAt(e.dist), r = dist(pr.lx, pr.ly, p.x, p.y);
          if (r <= pr.splash) damageEnemy(e, Math.round(pr.dmg * (1 - .5 * r / pr.splash)));
        }
      } else if (pr.type === 'frost'){
        frostBurst(pr.lx, pr.ly);
        if (pr.tgt && !pr.tgt.dead){ damageEnemy(pr.tgt, pr.dmg); applySlow(pr.tgt, pr.slow, pr.slowDur); }
      } else {
        if (pr.tgt && !pr.tgt.dead){ damageEnemy(pr.tgt, pr.dmg); spark(pr.lx, pr.ly, '255,240,200', 3, 60, .2, 2, 40); }
      }
      pr.hit = true;
      continue;
    }
    pr.x += dx/dd * step; pr.y += dy/dd * step;
    pr.trail -= dt;
    if (pr.type === 'cannon' && pr.trail <= 0){ pr.trail = .04;
      parts.push({ x:pr.x, y:pr.y, vx:rand(-8,8), vy:rand(-8,8), g:-6, life:.3, max:.3, size:rand(2.5,4.5), col:'130,130,130', mode:'smoke' }); }
    if (pr.type === 'frost' && pr.trail <= 0){ pr.trail = .03;
      parts.push({ x:pr.x, y:pr.y, vx:rand(-12,12), vy:rand(-12,12), g:0, life:.28, max:.28, size:rand(1.5,3), col:'180,230,255', mode:'glow' }); }
  }
  projs = projs.filter(p => !p.hit);

  // add any splitter spawns produced this frame
  if (pending.length){ for (const c of pending) enemies.push(c); pending = []; }

  // wave cleared?
  if (state === 'wave' && !spawnQ.length && !enemies.length) waveCleared();
}

function updateFxAmbient(dt, rdt){
  for (const p of parts){ p.life -= dt; p.x += p.vx*dt; p.y += p.vy*dt; p.vy += (p.g||0)*dt; }
  parts = parts.filter(p => p.life > 0);
  if (parts.length > 320) parts.splice(0, parts.length - 320);
  for (const f of fx){ f.life -= dt; if (f.kind === 'ring') f.r = lerp(f.max, 6, f.life / f.maxL); }
  fx = fx.filter(f => f.life > 0);
  for (const t of texts){ t.life -= dt; t.y -= 32*dt; }
  texts = texts.filter(t => t.life > 0);
  banner.t -= dt; shake = Math.max(0, shake - rdt*18); flashRed = Math.max(0, flashRed - rdt*1.4);
  for (const p of pollen){
    p.x += p.vx*rdt; p.y += p.vy*rdt; p.tw += rdt*3;
    if (p.x > W+10) { p.x = -10; p.y = rand(0,H); }
    if (p.y < -10) p.y = H+10; if (p.y > H+10) p.y = -10;
  }
  for (const c of clouds){ c.x += c.v*rdt; if (c.x - c.r > W) c.x = -c.r; }
}

// ---------- flow ----------
function startWave(){
  if (state !== 'idle') return;
  wave++;
  spawnQ = buildQueue(wave); spawnT = .5;
  state = 'wave';
  showBanner('WAVE ' + wave, wave % 5 === 0 ? 'Something big stirs in the cave…' : '');
  SND.wave();
  closePop();
}
function waveCleared(){
  const bonus = 30 + wave*8;
  gold += bonus;
  SND.clear();
  showBanner('WAVE ' + wave + ' CLEARED', '+' + bonus + ' gold');
  if (wave >= FINAL && !endless && !wonShown){ wonShown = true; victory(); return; }
  state = 'idle';
}
function gameOver(){
  state = 'over'; SND.over(); closePop(); placing = null; stage.classList.remove('placing');
  showPanel(`
    <div class="title" style="background:linear-gradient(180deg,#ffb0a6,#e05548 60%,#7d2018);-webkit-background-clip:text;background-clip:text;">DEFEAT</div>
    <div class="sub">THE KEEP HAS FALLEN</div>
    <div class="score">You survived <b style="color:var(--gold)">${wave - 1}</b> wave${wave-1===1?'':'s'}.<br>Score <b style="color:var(--gold)">${score.toLocaleString()}</b> · best combo <b style="color:var(--gold)">${bestCombo}×</b></div>
    <div class="row"><button class="btn gold big" id="againBtn">⟲ TRY AGAIN</button></div>`);
  document.getElementById('againBtn').onclick = () => { hidePanel(); resetGame(); };
}
function victory(){
  state = 'won'; SND.win(); closePop();
  showPanel(`
    <div class="title">VICTORY</div>
    <div class="sub">THE GROVE IS SAFE</div>
    <div class="score">All <b style="color:var(--gold)">${FINAL}</b> waves repelled with <b style="color:var(--red)">${lives}♥</b> remaining.<br>Score <b style="color:var(--gold)">${score.toLocaleString()}</b> · best combo <b style="color:var(--gold)">${bestCombo}×</b></div>
    <div class="row">
      <button class="btn gold big" id="endlessBtn">∞ ENDLESS MODE</button>
      <button class="btn big" id="again2Btn">⟲ RESTART</button>
