  document.getElementById('endlessBtn').onclick = () => { endless = true; state = 'idle'; hidePanel(); showBanner('ENDLESS MODE', 'How long can you hold?'); };
  document.getElementById('again2Btn').onclick = () => { hidePanel(); resetGame(); };
}
function resetGame(){
  gold = 300; lives = 20; wave = 0; endless = false; wonShown = false;
  enemies = []; towers = []; projs = []; parts = []; fx = []; texts = []; spawnQ = [];
  placing = null; selTower = null; stage.classList.remove('placing');
  score = 0; combo = 0; comboT = 0; bestCombo = 0;
  focusEnemy = null; aiming = null; rageT = 0; freezeFxT = 0; pending = [];
  for (const k of AKEYS) ABIL[k].cd = 0;
  tutDone();
  genDecor(); drawBackground();
  state = 'idle';
  showBanner('BUILD YOUR DEFENSE', 'The horde gathers in the cave…');
}
function showPanel(html){ document.getElementById('panel').innerHTML = html; document.getElementById('overlay').classList.remove('hide'); }
function hidePanel(){ document.getElementById('overlay').classList.add('hide'); }

// ---------- input ----------
function isPortrait(){ return window.matchMedia('(orientation:portrait) and (max-width:900px)').matches; }
function evtPos(e){
  const r = cv.getBoundingClientRect();
  if (isPortrait()){ // canvas is rotated 90° clockwise; invert the mapping
    const u = (e.clientX - r.left) / r.width, v = (e.clientY - r.top) / r.height;
    return { x: v * W, y: (1 - u) * H };
  }
  return { x: (e.clientX - r.left) * W / r.width, y: (e.clientY - r.top) * H / r.height };
}
cv.addEventListener('pointermove', e => { const p = evtPos(e); mouse.x = p.x; mouse.y = p.y; mouse.in = true; });
cv.addEventListener('pointerleave', () => mouse.in = false);
function enemyAt(x, y){
  let best = null, bd = 1e9;
  for (const e of enemies){
    if (e.dead) continue;
    const p = pointAt(e.dist), dd = dist(x, y, p.x, p.y);
    if (dd < e.r + 16 && dd < bd){ bd = dd; best = e; }
  }
  return best;
}
cv.addEventListener('pointerdown', e => {
  const p = evtPos(e); mouse.x = p.x; mouse.y = p.y; mouse.in = true;
  ac();
  if (state === 'menu' || state === 'over' || state === 'won') return;
  if (aiming === 'meteor'){ castMeteor(p.x, p.y); return; }   // spell targeting
  if (placing){
    if (canPlace(p.x, p.y)){
      if (gold >= TDEF[placing].cost){
        placeTower(placing, p.x, p.y);
        placing = null; stage.classList.remove('placing'); syncCards();
      } else addText(p.x, p.y, 'Not enough gold!', '#ff8a7a', 14);
    } else addText(p.x, p.y, 'Blocked', '#ff8a7a', 13);
    return;
  }
  const t = towerAt(p.x, p.y);
  if (t){ openPop(t); return; }
  const en = enemyAt(p.x, p.y);          // tap an enemy → focus-fire it
  if (en){
    focusEnemy = (focusEnemy === en) ? null : en;
    if (focusEnemy) addText(p.x, p.y - en.r - 8, '🎯 FOCUS', '#ffd76a', 13);
    closePop();
    return;
  }
  focusEnemy = null; closePop();
});
cv.addEventListener('contextmenu', e => { e.preventDefault(); cancelPlacing(); closePop(); });
window.addEventListener('keydown', e => {
  if (e.key === 'Escape'){ cancelPlacing(); closePop(); }
  if (e.key === ' '){ e.preventDefault(); if (state === 'idle') startWave(); }
  const i = ['1','2','3','4'].indexOf(e.key);
  if (i >= 0) togglePlacing(TKEYS[i]);
  const k = e.key.toLowerCase();
  if (k === 'q') useAbility('meteor');
  if (k === 'w') useAbility('freeze');
  if (k === 'e') useAbility('rage');
});
function cancelPlacing(){ placing = null; aiming = null; stage.classList.remove('placing'); syncCards(); }
function togglePlacing(key){
  if (state === 'menu' || state === 'over' || state === 'won') return;
  closePop();
  placing = (placing === key) ? null : key;
  stage.classList.toggle('placing', !!placing);
  syncCards();
}

// ---------- tower popup ----------
const pop = document.getElementById('pop');
function statLines(t){
  const d = TDEF[t.type], L = t.lvl, nx = L < 3;
  const row = (label, cur, next, suff = '') =>
    `${label} <b>${cur}${suff}</b>` + (nx ? ` <span class="nx">→ ${next}${suff}</span>` : '') + '<br>';
  let s = '';
  s += row('DMG', d.dmg[L-1], nx ? d.dmg[L] : '');
  s += row('RATE', (1/d.rate[L-1]).toFixed(1), nx ? (1/d.rate[L]).toFixed(1) : '', '/s');
  s += row('RANGE', d.range[L-1], nx ? d.range[L] : '');
  if (d.splash) s += row('SPLASH', d.splash[L-1], nx ? d.splash[L] : '');
  if (d.slow)   s += row('SLOW', Math.round((1-d.slow[L-1])*100), nx ? Math.round((1-d.slow[L])*100) : '', '%');
  if (d.chain)  s += row('CHAIN', d.chain[L-1], nx ? d.chain[L] : '');
  return s;
}
function openPop(t){
  selTower = t; placing = null; stage.classList.remove('placing'); syncCards();
  refreshPop();
  pop.classList.add('show');
  positionPop(t);
}
function refreshPop(){
  const t = selTower; if (!t) return;
  const d = TDEF[t.type];
  document.getElementById('popNm').textContent = d.name;
  document.getElementById('popPips').innerHTML = [1,2,3].map(i => `<i class="${i<=t.lvl?'on':''}"></i>`).join('');
  document.getElementById('popStats').innerHTML = statLines(t);
  const upg = document.getElementById('upgBtn');
  if (t.lvl < 3){ upg.disabled = gold < d.upg[t.lvl-1]; upg.textContent = '⬆ UPGRADE ' + d.upg[t.lvl-1]; }
  else { upg.disabled = true; upg.textContent = 'MAX LEVEL'; }
  document.getElementById('sellBtn').textContent = 'SELL +' + Math.floor(t.spent * .7);
  document.getElementById('prioBtn').textContent = '🎯 TARGET: ' + PRIO_LABEL[t.prio || 'first'];
}
const PRIO_ORDER = ['first','last','strong','close'];
const PRIO_LABEL = { first:'FIRST', last:'LAST', strong:'STRONGEST', close:'CLOSEST' };
document.getElementById('prioBtn').onclick = () => {
  const t = selTower; if (!t) return;
  const i = PRIO_ORDER.indexOf(t.prio || 'first');
  t.prio = PRIO_ORDER[(i + 1) % PRIO_ORDER.length];
  refreshPop();
};
function positionPop(t){
  // use layout (untransformed) size; separate x/y scale so it works under the fill stretch + rotation
  const lw = cv.offsetWidth, lh = cv.offsetHeight, scx = lw / W, scy = lh / H;
  let x = t.x * scx + 30, y = t.y * scy - 20;
  pop.style.left = '0px'; pop.style.top = '0px';
  const pw = pop.offsetWidth || 180, ph = pop.offsetHeight || 150;
  if (x + pw > lw - 8) x = t.x * scx - pw - 30;
  y = clamp(y, 54, lh - ph - 100);
  pop.style.left = x + 'px'; pop.style.top = y + 'px';
}
function closePop(){ selTower = null; pop.classList.remove('show'); }
document.getElementById('upgBtn').onclick = () => {
  const t = selTower; if (!t || t.lvl >= 3) return;
  const c = TDEF[t.type].upg[t.lvl-1];
  if (gold < c) return;
  gold -= c; t.spent += c; t.lvl++;
  SND.upg();
  fx.push({ kind:'ring', x:t.x, y:t.y, r:6, max:44, life:.35, maxL:.35, col:'255,220,120' });
  spark(t.x, t.y - 14, '255,225,140', 10, 90, .5, 3, 30);
  refreshPop();
};
document.getElementById('sellBtn').onclick = () => {
  const t = selTower; if (!t) return;
  gold += Math.floor(t.spent * .7);
  towers = towers.filter(x => x !== t);
  SND.sell();
  smoke(t.x, t.y, 5);
  closePop();
};
window.addEventListener('resize', closePop);

// ---------- rendering ----------
function drawEnemy(g, e){
  const p = pointAt(e.dist);
  const scale = e.age < .25 ? e.age / .25 : 1;
  const bob = Math.sin(time*10 + e.seed) * 2;
  const x = p.x, y = p.y + bob * .4;
  g.save(); g.translate(x, y); g.scale(scale, scale);

  // shadow
  g.fillStyle = 'rgba(0,0,0,.22)';
  g.beginPath(); g.ellipse(0, e.r*.8, e.r*.95, e.r*.34, 0, 0, TAU); g.fill();

  const slowed = e.slowT > 0;
  if (e.type === 'goblin' || e.type === 'brute' || e.type === 'boss'){
    const r = e.r;
    // feet
    const step = Math.sin(time*12 + e.seed) * r*.28;
    g.fillStyle = 'rgba(20,35,15,.85)';
    g.beginPath(); g.arc(-r*.4 + Math.cos(p.a)*step, r*.65, r*.22, 0, TAU); g.fill();
    g.beginPath(); g.arc( r*.4 - Math.cos(p.a)*step, r*.65, r*.22, 0, TAU); g.fill();
    // body
    let c1, c2, oc;
    if (e.type === 'goblin'){ c1='#8bd35f'; c2='#4f9636'; oc='#274d1e'; }
    else if (e.type === 'brute'){ c1='#cf8a5f'; c2='#9c5a3c'; oc='#54301e'; }
    else { c1='#b184e8'; c2='#7448b8'; oc='#3a2166'; }
    const bg2 = g.createRadialGradient(-r*.3, -r*.35, r*.15, 0, 0, r);
    bg2.addColorStop(0, c1); bg2.addColorStop(1, c2);
    g.fillStyle = bg2; g.strokeStyle = oc; g.lineWidth = 2;
    g.beginPath(); g.arc(0, 0, r, 0, TAU); g.fill(); g.stroke();
    // ears / spikes / armor
    if (e.type === 'goblin'){
      g.fillStyle = c2;
      g.beginPath(); g.moveTo(-r*.7,-r*.5); g.lineTo(-r*1.15,-r*.95); g.lineTo(-r*.35,-r*.85); g.closePath(); g.fill();
      g.beginPath(); g.moveTo( r*.7,-r*.5); g.lineTo( r*1.15,-r*.95); g.lineTo( r*.35,-r*.85); g.closePath(); g.fill();
    } else if (e.type === 'brute'){
      g.fillStyle = '#5c6068'; g.strokeStyle = '#3a3d43'; g.lineWidth = 1.6;
      g.beginPath(); g.arc(0, -r*.15, r*.92, Math.PI*1.05, Math.PI*1.95); g.lineTo(0,-r*.15); g.closePath(); g.fill(); g.stroke();
      g.fillStyle = '#9aa0a8';
      for (let i = -1; i <= 1; i++){ g.beginPath(); g.arc(i*r*.4, -r*.62, r*.08, 0, TAU); g.fill(); }
      g.fillStyle = '#f4efe0'; // tusks
      g.beginPath(); g.moveTo(-r*.34, r*.42); g.lineTo(-r*.5, r*.72); g.lineTo(-r*.16, r*.5); g.fill();
      g.beginPath(); g.moveTo( r*.34, r*.42); g.lineTo( r*.5, r*.72); g.lineTo( r*.16, r*.5); g.fill();
    } else {
      g.fillStyle = '#eac95a'; g.strokeStyle = '#8a6c14'; g.lineWidth = 1.4; // crown
      for (let i = -2; i <= 2; i++){
        const a = -Math.PI/2 + i*.42;
        const bx = Math.cos(a)*r*.92, by = Math.sin(a)*r*.92;
        g.beginPath(); g.moveTo(bx - 5, by + 3); g.lineTo(bx + Math.cos(a)*11, by + Math.sin(a)*11); g.lineTo(bx + 5, by + 3); g.closePath(); g.fill(); g.stroke();
      }
      g.save(); g.globalCompositeOperation = 'lighter';
      const au = g.createRadialGradient(0,0,r*.6, 0,0, r*1.7 + Math.sin(time*4)*4);
      au.addColorStop(0,'rgba(160,90,255,0)'); au.addColorStop(.7,'rgba(160,90,255,.14)'); au.addColorStop(1,'rgba(160,90,255,0)');
      g.fillStyle = au; g.beginPath(); g.arc(0,0,r*1.9,0,TAU); g.fill(); g.restore();
    }
    // eyes
    const ex = Math.cos(p.a)*r*.32, ey = Math.sin(p.a)*r*.32;
    const er = e.type==='boss' ? r*.2 : r*.24;
    g.fillStyle = e.type==='boss' ? '#ffd8f0' : '#fff';
    g.beginPath(); g.arc(-r*.32+ex, -r*.18+ey, er, 0, TAU); g.fill();
    g.beginPath(); g.arc( r*.32+ex, -r*.18+ey, er, 0, TAU); g.fill();
    g.fillStyle = e.type==='boss' ? '#c1206a' : '#1c2b16';
    g.beginPath(); g.arc(-r*.32+ex*1.3, -r*.18+ey*1.3, er*.45, 0, TAU); g.fill();
    g.beginPath(); g.arc( r*.32+ex*1.3, -r*.18+ey*1.3, er*.45, 0, TAU); g.fill();
  } else { // runner (wolf)
    const r = e.r;
    g.rotate(p.a);
    const legS = Math.sin(time*18 + e.seed) * 4;
    g.strokeStyle = '#5a626b'; g.lineWidth = 2.6; g.lineCap = 'round';
    g.beginPath(); g.moveTo(-r*.6, r*.3); g.lineTo(-r*.6 - legS, r*.85); g.stroke();
    g.beginPath(); g.moveTo( r*.5, r*.3); g.lineTo( r*.5 + legS, r*.85); g.stroke();
    const bg3 = g.createLinearGradient(0, -r, 0, r);
    bg3.addColorStop(0, '#b3bcc4'); bg3.addColorStop(1, '#78828c');
    g.fillStyle = bg3; g.strokeStyle = '#3e454d'; g.lineWidth = 2;
    g.beginPath(); g.ellipse(0, 0, r*1.45, r*.85, 0, 0, TAU); g.fill(); g.stroke();
    g.beginPath(); g.moveTo(r*1.2, -r*.3); g.lineTo(r*1.85, 0); g.lineTo(r*1.2, r*.35); g.closePath(); // snout
    g.fillStyle = '#98a2ab'; g.fill(); g.stroke();
    g.fillStyle = '#3e454d'; g.beginPath(); g.arc(r*1.75, 0, 2, 0, TAU); g.fill();
    g.beginPath(); g.moveTo(r*.55, -r*.7); g.lineTo(r*.85, -r*1.25); g.lineTo(r*.98, -r*.55); g.closePath(); // ear
    g.fillStyle = '#78828c'; g.fill(); g.stroke();
    g.strokeStyle = '#78828c'; g.lineWidth = 3.4; // tail
    g.beginPath(); g.moveTo(-r*1.3, 0);
    g.quadraticCurveTo(-r*1.9, -r*.4 + Math.sin(time*9+e.seed)*3, -r*2.2, -r*.2); g.stroke();
    g.fillStyle = '#ffe9e0'; // eye
    g.beginPath(); g.arc(r*.7, -r*.25, r*.18, 0, TAU); g.fill();
    g.fillStyle = '#22282e'; g.beginPath(); g.arc(r*.76, -r*.25, r*.09, 0, TAU); g.fill();
    g.rotate(-p.a);
  }

  // slowed tint + crystals
  if (slowed){
    g.fillStyle = 'rgba(140,210,255,.3)';
    g.beginPath(); g.arc(0, 0, e.r, 0, TAU); g.fill();
    g.fillStyle = 'rgba(220,245,255,.9)';
    for (let i = 0; i < 2; i++){
      const a = e.seed + i*2.4 + time*.5, cx = Math.cos(a)*e.r*.7, cy = -e.r - 4 + Math.sin(time*6+i)*1.5;
      g.beginPath(); g.moveTo(cx, cy-4); g.lineTo(cx+3, cy+2); g.lineTo(cx-3, cy+2); g.closePath(); g.fill();
    }
  }
  // hit flash
  if (e.flash > 0){
    g.globalCompositeOperation = 'lighter';
    g.fillStyle = `rgba(255,255,255,${e.flash*6})`;
    g.beginPath(); g.arc(0, 0, e.r, 0, TAU); g.fill();
    g.globalCompositeOperation = 'source-over';
  }
  g.restore();

  // hp bar
  if (e.hp < e.maxHp){
    const w = e.r*2.3, h = e.type==='boss' ? 6 : 4, bx = x - w/2, by = y - e.r - 12;
    const pct = clamp(e.hp / e.maxHp, 0, 1);
    g.fillStyle = 'rgba(10,16,10,.78)';
    g.beginPath(); g.roundRect(bx-1, by-1, w+2, h+2, 3); g.fill();
    const hg = g.createLinearGradient(bx, 0, bx+w, 0);
    const col = pct > .5 ? '#6fdc57' : pct > .25 ? '#f2c14e' : '#f26a4e';
    hg.addColorStop(0, col); hg.addColorStop(1, col);
    g.fillStyle = hg; g.beginPath(); g.roundRect(bx, by, w*pct, h, 2.5); g.fill();
  }
}

function drawTowerSprite(g, x, y, type, lvl, angle, flash, recoil, alpha = 1){
  const s = 1 + (lvl-1)*.1;
  g.save(); g.translate(x, y); g.globalAlpha = alpha;

  g.fillStyle = 'rgba(0,0,0,.24)';
  g.beginPath(); g.ellipse(2, 8*s, 21*s, 8*s, 0, 0, TAU); g.fill();

  // stone base
  const base = g.createRadialGradient(-6, -6, 4, 0, 0, 20*s);
  base.addColorStop(0, '#c6bfae'); base.addColorStop(1, '#8b8474');
  g.fillStyle = base; g.strokeStyle = '#575145'; g.lineWidth = 2.4;
  g.beginPath(); g.arc(0, 0, 19*s, 0, TAU); g.fill(); g.stroke();
  g.strokeStyle = 'rgba(60,55,45,.4)'; g.lineWidth = 1.2;
  g.beginPath(); g.arc(0, 0, 13.5*s, 0, TAU); g.stroke();
  if (lvl >= 3){ g.strokeStyle = '#f0c05a'; g.lineWidth = 2; g.beginPath(); g.arc(0, 0, 16.5*s, 0, TAU); g.stroke(); }

  if (type === 'archer'){
    g.save(); g.rotate(angle);
    g.fillStyle = '#6d4a28'; g.strokeStyle = '#3f2a15'; g.lineWidth = 2;
    g.beginPath(); g.roundRect(-9*s, -4*s, 15*s, 8*s, 3); g.fill(); g.stroke(); // stock
    g.strokeStyle = '#a9763f'; g.lineWidth = 3*s; // limbs
    g.beginPath(); g.arc(4*s, 0, 11*s, -1.15, 1.15); g.stroke();
    g.strokeStyle = '#efe6d2'; g.lineWidth = 1.3; // string
    const bx = 4*s + Math.cos(1.15)*11*s, by = Math.sin(1.15)*11*s;
    g.beginPath(); g.moveTo(bx, -by); g.lineTo(-2*s, 0); g.lineTo(bx, by); g.stroke();
    g.strokeStyle = '#d8cdb4'; g.lineWidth = 2; // loaded arrow
    g.beginPath(); g.moveTo(-2*s, 0); g.lineTo(13*s, 0); g.stroke();
    g.restore();
    g.fillStyle = '#7d4e2a'; g.strokeStyle = '#3f2a15'; g.lineWidth = 1.6; // pivot cap
    g.beginPath(); g.arc(0, 0, 5*s, 0, TAU); g.fill(); g.stroke();
  }
  else if (type === 'cannon'){
    const dome = g.createRadialGradient(-4, -6, 2, 0, -2, 13*s);
    dome.addColorStop(0, '#7a828d'); dome.addColorStop(1, '#464c55');
    g.fillStyle = dome; g.strokeStyle = '#23272d'; g.lineWidth = 2.2;
    g.beginPath(); g.arc(0, -2, 12*s, 0, TAU); g.fill(); g.stroke();
    g.save(); g.rotate(angle); g.translate(-recoil, 0);
    const bl = g.createLinearGradient(0, -6, 0, 6);
    bl.addColorStop(0, '#5b626c'); bl.addColorStop(1, '#31363d');
    g.fillStyle = bl; g.strokeStyle = '#1d2126'; g.lineWidth = 2;
    g.beginPath(); g.roundRect(2*s, -5.5*s, 24*s, 11*s, 4); g.fill(); g.stroke();
    g.fillStyle = '#f0c05a';
    g.fillRect(8*s, -5.5*s, 3.5*s, 11*s); // gold band
    g.fillStyle = '#14171b';
    g.beginPath(); g.arc(26*s, 0, 4.4*s, 0, TAU); g.fill(); // muzzle
    g.restore();
  }
  else if (type === 'frost'){
    const bob = Math.sin(time*3 + x*.01) * 2;
    g.fillStyle = 'rgba(127,212,240,.9)'; g.strokeStyle = '#3d88a8'; g.lineWidth = 1.8;
    const spike = (sx, hgt, wd, tilt) => {
      g.save(); g.translate(sx, 4); g.rotate(tilt);
      g.beginPath(); g.moveTo(-wd, 0); g.lineTo(0, -hgt); g.lineTo(wd, 0); g.closePath(); g.fill(); g.stroke();
      g.restore();
    };
    spike(-8*s, 17*s, 5*s, -.22); spike(8*s, 15*s, 5*s, .24); spike(0, 24*s, 6*s, 0);
    g.save(); g.globalCompositeOperation = 'lighter';
    const orb = g.createRadialGradient(0, -20*s + bob, 1, 0, -20*s + bob, 8*s);
    orb.addColorStop(0, 'rgba(235,250,255,.95)'); orb.addColorStop(.5, 'rgba(150,220,250,.55)'); orb.addColorStop(1, 'rgba(150,220,250,0)');
    g.fillStyle = orb; g.beginPath(); g.arc(0, -20*s + bob, 9*s, 0, TAU); g.fill();
    g.restore();
  }
  else { // tesla
    g.fillStyle = '#8a5a28';
    g.beginPath(); g.roundRect(-7*s, -8*s, 14*s, 12*s, 3); g.fill();
    for (let i = 0; i < 3; i++){
      const cy = -6*s - i*7*s, cw = (13 - i*2.6)*s;
      const cg = g.createLinearGradient(-cw, cy, cw, cy);
      cg.addColorStop(0, '#e8a955'); cg.addColorStop(.5, '#ad6f2c'); cg.addColorStop(1, '#e8a955');
      g.fillStyle = cg; g.strokeStyle = '#6b4218'; g.lineWidth = 1.5;
      g.beginPath(); g.ellipse(0, cy, cw, 4.2*s, 0, 0, TAU); g.fill(); g.stroke();
    }
    g.save(); g.globalCompositeOperation = 'lighter';
    const tp = g.createRadialGradient(0, -27*s, 1, 0, -27*s, 8*s + Math.sin(time*7)*1.5);
    tp.addColorStop(0, 'rgba(255,250,220,.95)'); tp.addColorStop(.5, 'rgba(255,220,120,.5)'); tp.addColorStop(1, 'rgba(255,220,120,0)');
    g.fillStyle = tp; g.beginPath(); g.arc(0, -27*s, 9.5*s, 0, TAU); g.fill();
    g.restore();
    g.fillStyle = '#f4f0e2'; g.strokeStyle = '#8a6c14'; g.lineWidth = 1.4;
    g.beginPath(); g.arc(0, -27*s, 4.6*s, 0, TAU); g.fill(); g.stroke();
  }

  // muzzle flash
  if (flash > 0 && (type === 'archer' || type === 'cannon')){
    g.save(); g.rotate(angle); g.globalCompositeOperation = 'lighter';
    const fl = g.createRadialGradient(24*s, 0, 1, 24*s, 0, 14);
    fl.addColorStop(0, 'rgba(255,245,200,.95)'); fl.addColorStop(1, 'rgba(255,180,60,0)');
    g.fillStyle = fl; g.beginPath(); g.arc(24*s, 0, 14, 0, TAU); g.fill();
    g.restore();
  }

  // level pips
  for (let i = 0; i < lvl; i++){
    g.fillStyle = '#f0c05a'; g.strokeStyle = '#7a5a10'; g.lineWidth = 1;
    g.beginPath(); g.arc((i - (lvl-1)/2) * 8, 24*s, 2.6, 0, TAU); g.fill(); g.stroke();
  }
  g.restore();
}

function drawRange(g, x, y, r, ok = true){
  g.save();
  g.fillStyle = ok ? 'rgba(240,220,140,.09)' : 'rgba(255,90,70,.10)';
  g.strokeStyle = ok ? 'rgba(240,220,140,.55)' : 'rgba(255,110,90,.65)';
  g.lineWidth = 1.6; g.setLineDash([7, 7]); g.lineDashOffset = -time*20;
  g.beginPath(); g.arc(x, y, r, 0, TAU); g.fill(); g.stroke();
  g.restore();
}

function render(){
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  if (shake > 0) ctx.translate(rand(-shake, shake), rand(-shake, shake));

  // pond shimmer
  ctx.save(); ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < 3; i++){
    const a = time*.7 + i*2.1;
    ctx.strokeStyle = 'rgba(210,240,255,.10)'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(POND.x, POND.y, POND.r*(.35+.2*i) + Math.sin(a)*4, (POND.r*(.35+.2*i))*.8 + Math.cos(a)*3, 0, 0, TAU);
    ctx.stroke();
  }
  ctx.restore();

  // cloud shadows
  for (const c of clouds){
    const cg = ctx.createRadialGradient(c.x, c.y, c.r*.2, c.x, c.y, c.r);
    cg.addColorStop(0, 'rgba(10,30,10,.07)'); cg.addColorStop(1, 'rgba(10,30,10,0)');
    ctx.fillStyle = cg; ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, TAU); ctx.fill();
  }

  // selected tower range
  if (selTower) drawRange(ctx, selTower.x, selTower.y, tStat(selTower, 'range'));

  // depth-sorted entities
  const list = [];
  for (const e of enemies) list.push({ y: pointAt(e.dist).y, f: () => drawEnemy(ctx, e) });
  for (const t of towers) list.push({ y: t.y, f: () => drawTowerSprite(ctx, t.x, t.y, t.type, t.lvl, t.angle, t.flash, t.recoil) });
  list.sort((a, b) => a.y - b.y);
  for (const it of list) it.f();

  // enemy trait overlays (shield / heal aura / flyer / focus marker)
  for (const e of enemies){
    if (e.dead) continue;
    const p = pointAt(e.dist);
    if (e.fly){                                   // shadow below + hover lift cue
      ctx.fillStyle = 'rgba(0,0,0,.22)';
      ctx.beginPath(); ctx.ellipse(p.x, p.y + e.r*1.15, e.r*.9, e.r*.34, 0, 0, TAU); ctx.fill();
      ctx.strokeStyle = 'rgba(200,225,255,.5)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(p.x - e.r, p.y - e.r*.5);
      ctx.quadraticCurveTo(p.x - e.r*1.5, p.y - e.r, p.x - e.r*.4, p.y - e.r*.9);
      ctx.moveTo(p.x + e.r, p.y - e.r*.5);
      ctx.quadraticCurveTo(p.x + e.r*1.5, p.y - e.r, p.x + e.r*.4, p.y - e.r*.9); ctx.stroke();
    }
    if (e.maxShield > 0 && e.shield > 0){         // cyan shield arc
      const frac = e.shield / e.maxShield;
      ctx.save(); ctx.globalCompositeOperation = 'lighter';
      ctx.strokeStyle = 'rgba(120,210,255,.85)'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(p.x, p.y, e.r + 6, -Math.PI/2, -Math.PI/2 + TAU*frac); ctx.stroke();
      ctx.restore();
    }
    if (e.heal){                                  // green healer aura
      const pu = .5 + .5*Math.sin(time*4 + e.seed);
      ctx.save(); ctx.globalCompositeOperation = 'lighter';
      ctx.strokeStyle = `rgba(120,240,150,${.25 + .25*pu})`; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(p.x, p.y, e.r + 5, 0, TAU); ctx.stroke();
      ctx.fillStyle = 'rgba(150,255,180,.9)'; ctx.font = 'bold 12px system-ui';
      ctx.textAlign = 'center'; ctx.fillText('+', p.x, p.y - e.r - 8);
      ctx.restore();
    }
    if (e === focusEnemy){                         // player focus crosshair
      ctx.save(); ctx.strokeStyle = '#ffd76a'; ctx.lineWidth = 2.4;
      const rr = e.r + 10 + Math.sin(time*6)*1.5;
      for (let a = 0; a < 4; a++){
        const ang = a*Math.PI/2 + time*1.5;
        ctx.beginPath();
        ctx.arc(p.x, p.y, rr, ang + .35, ang + Math.PI/2 - .35); ctx.stroke();
      }
      ctx.restore();
    }
  }

  // projectiles
  for (const pr of projs){
    if (pr.type === 'archer'){
      const a = Math.atan2(pr.ly - pr.y, pr.lx - pr.x);
      ctx.save(); ctx.translate(pr.x, pr.y); ctx.rotate(a);
      ctx.strokeStyle = 'rgba(90,60,30,.9)'; ctx.lineWidth = 2.4;
      ctx.beginPath(); ctx.moveTo(-9, 0); ctx.lineTo(6, 0); ctx.stroke();
      ctx.fillStyle = '#d9d2bd';
      ctx.beginPath(); ctx.moveTo(9, 0); ctx.lineTo(3, -3); ctx.lineTo(3, 3); ctx.closePath(); ctx.fill();
      ctx.restore();
    } else if (pr.type === 'cannon'){
      ctx.fillStyle = '#22262b'; ctx.strokeStyle = '#0c0e11'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(pr.x, pr.y, 5.5, 0, TAU); ctx.fill(); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,.25)';
      ctx.beginPath(); ctx.arc(pr.x - 1.6, pr.y - 1.6, 1.8, 0, TAU); ctx.fill();
    } else {
      ctx.save(); ctx.globalCompositeOperation = 'lighter';
      const og = ctx.createRadialGradient(pr.x, pr.y, 1, pr.x, pr.y, 9);
      og.addColorStop(0, 'rgba(240,252,255,.95)'); og.addColorStop(.5, 'rgba(140,215,250,.6)'); og.addColorStop(1, 'rgba(140,215,250,0)');
      ctx.fillStyle = og; ctx.beginPath(); ctx.arc(pr.x, pr.y, 9, 0, TAU); ctx.fill();
      ctx.restore();
    }
  }

  // particles
  for (const p of parts){
    const t = clamp(p.life / p.max, 0, 1);
    if (p.mode === 'smoke'){
      ctx.fillStyle = `rgba(${p.col},${.28*t})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size*(2 - t), 0, TAU); ctx.fill();
    } else {
      ctx.save(); ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = `rgba(${p.col},${.9*t})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size*t + .4, 0, TAU); ctx.fill();
      ctx.restore();
    }
  }

  // effects
  ctx.save(); ctx.globalCompositeOperation = 'lighter';
  for (const f of fx){
    const t = clamp(f.life / f.maxL, 0, 1);
    if (f.kind === 'ring'){
      ctx.strokeStyle = `rgba(${f.col},${.8*t})`; ctx.lineWidth = 2.5 + 2*t;
      ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, TAU); ctx.stroke();
    } else if (f.kind === 'flash'){
      const fg = ctx.createRadialGradient(f.x, f.y, 1, f.x, f.y, f.r);
      fg.addColorStop(0, `rgba(${f.col},${.85*t})`); fg.addColorStop(1, `rgba(${f.col},0)`);
      ctx.fillStyle = fg; ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, TAU); ctx.fill();
    } else if (f.kind === 'bolt'){
      for (const pass of [[7, .18], [2.2, .95]]){
        ctx.strokeStyle = pass[0] > 3 ? `rgba(150,210,255,${pass[1]*t})` : `rgba(255,255,255,${pass[1]*t})`;
        ctx.lineWidth = pass[0]; ctx.lineJoin = 'round';
        ctx.beginPath(); ctx.moveTo(f.pts[0][0], f.pts[0][1]);
        for (let i = 1; i < f.pts.length; i++) ctx.lineTo(f.pts[i][0], f.pts[i][1]);
        ctx.stroke();
      }
    }
  }
  ctx.restore();

  // pollen
  ctx.save(); ctx.globalCompositeOperation = 'lighter';
  for (const p of pollen){
    ctx.fillStyle = `rgba(255,250,210,${.10 + .08*Math.sin(p.tw)})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, TAU); ctx.fill();
  }
  ctx.restore();

  // floating texts
  for (const t of texts){
    const a = clamp(t.life / t.max, 0, 1);
    ctx.font = `800 ${t.size}px system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.lineWidth = 3.5; ctx.strokeStyle = `rgba(20,26,16,${.8*a})`;
    ctx.strokeText(t.txt, t.x, t.y);
    ctx.fillStyle = t.col; ctx.globalAlpha = a;
    ctx.fillText(t.txt, t.x, t.y);
    ctx.globalAlpha = 1;
  }

  // placement ghost
  if (placing && mouse.in && state !== 'menu'){
    const ok = canPlace(mouse.x, mouse.y);
    drawRange(ctx, mouse.x, mouse.y, TDEF[placing].range[0], ok);
    drawTowerSprite(ctx, mouse.x, mouse.y, placing, 1, -0.5, 0, 0, .65);
    ctx.strokeStyle = ok ? 'rgba(140,240,120,.9)' : 'rgba(255,90,70,.9)';
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(mouse.x, mouse.y, 23, 0, TAU); ctx.stroke();
  }

  // guidance marker (tutorial spot, advisor spot, or upgrade ring)
  let mark = null;
  if (tut.active && tut.step === 2 && tut.spot) mark = { kind:'spot', x:tut.spot.x, y:tut.spot.y };
  else if (state === 'idle' && !(tut.active && tut.step < 3)){
    const a = computeAdvice();
    if (a.act === 'buy' && a.spot) mark = { kind:'spot', x:a.spot.x, y:a.spot.y };
    else if (a.act === 'up') mark = { kind:'tower', t:a.t };
  }
  if (mark && mark.kind === 'spot'){
    const s = mark;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const hg = ctx.createRadialGradient(s.x, s.y, 2, s.x, s.y, 34);
    hg.addColorStop(0, 'rgba(255,225,130,.30)'); hg.addColorStop(1, 'rgba(255,225,130,0)');
    ctx.fillStyle = hg; ctx.beginPath(); ctx.arc(s.x, s.y, 34, 0, TAU); ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.strokeStyle = 'rgba(255,222,110,.95)'; ctx.lineWidth = 3;
    ctx.setLineDash([8, 7]); ctx.lineDashOffset = -time*30;
    ctx.beginPath(); ctx.arc(s.x, s.y, 26 + Math.sin(time*5)*3, 0, TAU); ctx.stroke();
    ctx.setLineDash([]);
    const gy = s.y - 48 + Math.sin(time*6)*5;
    ctx.fillStyle = '#ffe089'; ctx.strokeStyle = 'rgba(90,64,10,.8)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(s.x, gy + 13); ctx.lineTo(s.x - 9, gy); ctx.lineTo(s.x + 9, gy);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.restore();
  } else if (mark && mark.kind === 'tower'){
    const t = mark.t;
    ctx.save();
    ctx.strokeStyle = 'rgba(255,222,110,.95)'; ctx.lineWidth = 3;
    ctx.setLineDash([9, 7]); ctx.lineDashOffset = -time*30;
    ctx.beginPath(); ctx.arc(t.x, t.y, 29 + Math.sin(time*5)*2.5, 0, TAU); ctx.stroke();
    ctx.setLineDash([]);
    const gy = t.y - 52 + Math.sin(time*6)*4;   // bobbing gold ⬆
    ctx.fillStyle = '#ffe089'; ctx.strokeStyle = 'rgba(90,64,10,.8)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(t.x, gy); ctx.lineTo(t.x - 9, gy + 11); ctx.lineTo(t.x + 9, gy + 11);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillRect(t.x - 3, gy + 11, 6, 8);
    ctx.restore();
  }

  // wave banner — hidden while the idle "start wave" panel is up so they don't overlap
  if (banner.t > 0 && !(state === 'idle' && !placing)){
    const t = banner.t / banner.max;
    const aIn = clamp((1 - t) * 6, 0, 1), aOut = clamp(t * 4, 0, 1);
    const a = Math.min(aIn, aOut);
    const sc = .92 + .08 * clamp((1 - t) * 5, 0, 1);
    ctx.save(); ctx.translate(W/2, H*.3); ctx.scale(sc, sc); ctx.globalAlpha = a;
    ctx.textAlign = 'center';
    ctx.font = '900 52px system-ui, sans-serif';
    ctx.lineWidth = 8; ctx.strokeStyle = 'rgba(16,22,14,.85)'; ctx.strokeText(banner.txt, 0, 0);
    const bgr = ctx.createLinearGradient(0, -40, 0, 12);
    bgr.addColorStop(0, '#ffe9a8'); bgr.addColorStop(1, '#e9a93c');
    ctx.fillStyle = bgr; ctx.fillText(banner.txt, 0, 0);
    if (banner.sub){
      ctx.font = '700 19px system-ui, sans-serif';
      ctx.lineWidth = 5; ctx.strokeText(banner.sub, 0, 32);
      ctx.fillStyle = '#eef2e4'; ctx.fillText(banner.sub, 0, 32);
    }
    ctx.restore();
  }

  // meteor targeting reticle (follows the cursor while aiming)
  if (aiming === 'meteor' && mouse.in){
    const R = 130;
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    const rg = ctx.createRadialGradient(mouse.x, mouse.y, 8, mouse.x, mouse.y, R);
    rg.addColorStop(0, 'rgba(255,150,60,.28)'); rg.addColorStop(1, 'rgba(255,150,60,0)');
    ctx.fillStyle = rg; ctx.beginPath(); ctx.arc(mouse.x, mouse.y, R, 0, TAU); ctx.fill();
    ctx.restore();
    ctx.strokeStyle = 'rgba(255,180,90,.9)'; ctx.lineWidth = 2; ctx.setLineDash([8, 7]);
    ctx.beginPath(); ctx.arc(mouse.x, mouse.y, R, 0, TAU); ctx.stroke(); ctx.setLineDash([]);
  }

  ctx.restore(); // shake

  // freeze / rage full-screen tints
  if (freezeFxT > 0){ ctx.fillStyle = `rgba(150,210,255,${Math.min(.28, freezeFxT*.11)})`; ctx.fillRect(0, 0, W, H); }
  if (rageT > 0){
    const rv = ctx.createRadialGradient(W/2, H/2, H*.35, W/2, H/2, H*.9);
    rv.addColorStop(0, 'rgba(255,120,40,0)'); rv.addColorStop(1, `rgba(255,90,30,${Math.min(.22, rageT*.05)})`);
    ctx.fillStyle = rv; ctx.fillRect(0, 0, W, H);
  }

  // combo banner
  if (combo >= 3){
    const a = clamp(comboT / 2.6, 0, 1), pop = 1 + (1 - a) * .3;
    ctx.save(); ctx.translate(W/2, 96); ctx.scale(pop, pop); ctx.textAlign = 'center';
    ctx.font = '900 38px system-ui, sans-serif';
    ctx.lineWidth = 7; ctx.strokeStyle = 'rgba(16,22,14,.8)';
    ctx.strokeText(combo + '× COMBO', 0, 0);
    ctx.fillStyle = combo >= 15 ? '#ff8a5e' : combo >= 10 ? '#ffd76a' : '#eef2e4';
    ctx.fillText(combo + '× COMBO', 0, 0);
    ctx.font = '800 15px system-ui, sans-serif'; ctx.fillStyle = '#ffe6a6';
    ctx.fillText('gold ×' + comboMult(), 0, 22);
    ctx.restore();
  }

  // red damage vignette
  if (flashRed > 0){
    const rv = ctx.createRadialGradient(W/2, H/2, H*.3, W/2, H/2, H*.85);
    rv.addColorStop(0, 'rgba(200,30,20,0)');
    rv.addColorStop(1, `rgba(200,30,20,${flashRed*.5})`);
    ctx.fillStyle = rv; ctx.fillRect(0, 0, W, H);
  }
}

// ---------- build advisor ----------
const ORDER = ['archer','archer','frost','archer','cannon','archer','tesla','cannon','frost','archer','tesla','cannon','tesla','cannon'];
let adv = null, advKey = '';
function computeAdvice(){
  const n = wave + 1;
  const lvSum = towers.reduce((s, t) => s + t.lvl, 0);
  const key = [gold, towers.length, lvSum, n, endless].join(',');
  if (key === advKey && adv) return adv;
  advKey = key;
  const cnt = { archer:0, frost:0, cannon:0, tesla:0 };
  for (const t of towers) cnt[t.type]++;
  const rem = { ...cnt };
  let buyType = null;
  for (const k of ORDER){
    if (rem[k] > 0) rem[k]--;
    else { buyType = k; break; }
  }
  if (!buyType) buyType = 'tesla';
  if (n % 5 === 0 && !cnt.cannon && !cnt.tesla && towers.length >= 2 && gold >= TDEF.cannon.cost) buyType = 'cannon';
  const capTowers = Math.min(3 + Math.ceil(n / 2), 10);
  const wantBuy = towers.length < capTowers;
  let upT = null;
  for (const t of towers){
    if (t.lvl >= 3) continue;
    if (!upT || t.lvl < upT.lvl ||
       (t.lvl === upT.lvl && TDEF[t.type].upg[t.lvl-1] < TDEF[upT.type].upg[upT.lvl-1])) upT = t;
  }
  if (wantBuy){
    const cost = TDEF[buyType].cost, spot = bestSpot();
    if (gold >= cost) adv = { act:'buy', type:buyType, cost, spot };
    else if (upT && towers.length >= 2 && gold >= TDEF[upT.type].upg[upT.lvl-1])
      adv = { act:'up', t:upT, cost:TDEF[upT.type].upg[upT.lvl-1] };
    else adv = { act:'save', type:buyType, cost, need:cost - gold };
  } else if (upT){
    const cost = TDEF[upT.type].upg[upT.lvl-1];
    adv = gold >= cost ? { act:'up', t:upT, cost }
                       : { act:'save', type:upT.type, cost, need:cost - gold, up:true };
  } else adv = { act:'ready' };
  return adv;
}

// ---------- ability bar ----------
const abilsEl = document.getElementById('abils');
function buildAbils(){
  abilsEl.innerHTML = '';
  for (const k of AKEYS){
    const a = ABIL[k];
    const b = document.createElement('button');
    b.className = 'abil'; b.dataset.k = k;
    b.innerHTML = `<span class="ak">${a.hot}</span><span class="ai">${a.icon}</span><span class="an">${a.name.toUpperCase()}</span><span class="cov"></span><span class="cd"></span>`;
    b.onclick = () => { ac(); useAbility(k); };
    abilsEl.appendChild(b);
  }
}
function updateAbils(){
  abilsEl.style.display = (state === 'menu') ? 'none' : 'flex';
  const active = (state === 'wave');
  for (const b of abilsEl.children){
    const a = ABIL[b.dataset.k];
    const frac = a.cd > 0 ? a.cd / a.max : 0;
    b.querySelector('.cov').style.setProperty('--deg', (frac * 360) + 'deg');
    b.querySelector('.cd').textContent = a.cd > 0 ? Math.ceil(a.cd) : '';
    b.classList.toggle('ready', active && a.cd <= 0);
    b.classList.toggle('off', !active || a.cd > 0);
    b.classList.toggle('armed', aiming === b.dataset.k);
  }
}

// ---------- UI sync ----------
const goldEl = document.getElementById('goldVal'), livesEl = document.getElementById('livesVal'),
      waveEl = document.getElementById('waveVal'), scoreEl = document.getElementById('scoreVal');
const nwEl = document.getElementById('nextWave'), nwTitle = document.getElementById('nwTitle'),
      nwHint = document.getElementById('nwHint'), nwBtn = document.getElementById('nwBtn'),
      advBtn = document.getElementById('advBtn');
let cGold = -1, cLives = -1, cWaveTxt = '', cNW = null, cScore = -1;
function syncUI(){
  if (gold !== cGold){ cGold = gold; goldEl.textContent = gold; syncCards(); if (selTower) refreshPop(); }
  if (lives !== cLives){ cLives = lives; livesEl.textContent = lives; }
  if (score !== cScore){ cScore = score; scoreEl.textContent = score; }
  updateAbils();
  let wt;
  if (state === 'wave'){
    wt = 'WAVE ' + wave + (endless ? '' : '/' + FINAL) + ' — ' + (enemies.length + spawnQ.length) + ' LEFT';
  } else {
    const cw = Math.min(wave + 1, endless ? wave + 1 : FINAL);
    wt = endless ? 'WAVE ' + cw : 'WAVE ' + cw + '/' + FINAL;
  }
  if (wt !== cWaveTxt){ cWaveTxt = wt; waveEl.textContent = wt; }
  refreshNextWave();
}
function refreshNextWave(){
  if (state !== 'idle' || placing){
    if (cNW !== null){ cNW = null; nwEl.classList.remove('show'); }
    return;
  }
  const n = wave + 1;
  const a = computeAdvice();
  let advLine = '', btnTxt = null, btnOff = false;
  if (a.act === 'buy'){
    advLine = '👉 Buy a <b>' + TDEF[a.type].name + '</b> and place it on the ✦ <b>glowing spot</b>';
    btnTxt = '🛒 BUY ' + TDEF[a.type].name + ' · ' + a.cost;
  } else if (a.act === 'up'){
    advLine = '👉 Upgrade your <b>' + TDEF[a.t.type].name + '</b> — it\'s marked on the map';
    btnTxt = '⬆ UPGRADE ' + TDEF[a.t.type].name + ' · ' + a.cost;
  } else if (a.act === 'save'){
    advLine = '💰 Save <b>' + a.need + '</b> more gold for ' + (a.up ? 'an upgrade' : 'a <b>' + TDEF[a.type].name + '</b>') + '<br><span style="opacity:.65">start the wave — kills earn gold</span>';
    btnTxt = 'NEED ' + a.need + ' MORE GOLD';
    btnOff = true;
  } else {
    advLine = '✅ <b>Defense looks strong</b> — release the wave!';
  }
  const hints = [];
  if (n % 5 === 0) hints.push('⚠ <b>BOSS WAVE</b> — bring heavy firepower');
  hints.push(advLine);
  const sig = n + '|' + hints.join('~') + '|' + (btnTxt || '') + '|' + btnOff + '|' + endless;
  if (sig === cNW) return;
  cNW = sig;
  nwEl.classList.add('show');
  nwTitle.innerHTML = 'WAVE ' + n + (endless ? '' : ' <span style="opacity:.5;font-size:.68em">/ ' + FINAL + '</span>');
  nwHint.innerHTML = hints.join('<br>');
  if (btnTxt){ advBtn.classList.add('show'); advBtn.textContent = btnTxt; advBtn.disabled = btnOff; }
  else advBtn.classList.remove('show');
  nwBtn.textContent = '▶ START WAVE ' + n;
}
nwBtn.onclick = () => { ac(); startWave(); };
advBtn.onclick = () => {
  ac();
  const a = computeAdvice();
  if (a.act === 'buy'){
    togglePlacing(a.type);
  } else if (a.act === 'up'){
    const t = a.t, c = a.cost;
    if (gold < c) return;
    gold -= c; t.spent += c; t.lvl++;
    SND.upg();
    fx.push({ kind:'ring', x:t.x, y:t.y, r:6, max:44, life:.35, maxL:.35, col:'255,220,120' });
    spark(t.x, t.y - 14, '255,225,140', 10, 90, .5, 3, 30);
  }
};

// ---------- tower cards ----------
function drawCardIcon(g, key){
  // 64×64 logical space, centered symbolic icon per tower
  const cx = 32, cy = 32;
  const glows = { archer:'240,170,80', frost:'120,210,250', cannon:'255,140,70', tesla:'255,225,120' };
  const gl = g.createRadialGradient(cx, cy, 4, cx, cy, 30);
  gl.addColorStop(0, `rgba(${glows[key]},.32)`); gl.addColorStop(1, `rgba(${glows[key]},0)`);
  g.fillStyle = gl; g.beginPath(); g.arc(cx, cy, 30, 0, TAU); g.fill();

  if (key === 'archer'){
    g.save(); g.translate(cx, cy); g.rotate(-Math.PI/4);
    g.strokeStyle = '#b5804a'; g.lineWidth = 4.6; g.lineCap = 'round';   // bow
    g.beginPath(); g.arc(-4, 0, 20, -1.25, 1.25); g.stroke();
    const bx = -4 + Math.cos(1.25)*20, by = Math.sin(1.25)*20;
    g.strokeStyle = '#efe6d2'; g.lineWidth = 1.7;                        // string
    g.beginPath(); g.moveTo(bx, -by); g.lineTo(-10, 0); g.lineTo(bx, by); g.stroke();
    g.strokeStyle = '#e8dfc8'; g.lineWidth = 3;                          // arrow shaft
    g.beginPath(); g.moveTo(-10, 0); g.lineTo(15, 0); g.stroke();
    g.fillStyle = '#f6f1e2';                                             // arrowhead
    g.beginPath(); g.moveTo(24, 0); g.lineTo(13, -5.5); g.lineTo(13, 5.5); g.closePath(); g.fill();
    g.fillStyle = '#e05548';                                             // fletching
    g.beginPath(); g.moveTo(-10, 0); g.lineTo(-17, -5); g.lineTo(-13, 0); g.lineTo(-17, 5); g.closePath(); g.fill();
    g.restore();
  }
  else if (key === 'frost'){
    g.save(); g.translate(cx, cy);
    g.strokeStyle = '#d6f1fd'; g.lineWidth = 3.4; g.lineCap = 'round';
    g.shadowColor = 'rgba(140,215,250,.9)'; g.shadowBlur = 8;
    for (let i = 0; i < 6; i++){
      g.save(); g.rotate(i * Math.PI/3);
      g.beginPath(); g.moveTo(0, 0); g.lineTo(0, -19); g.stroke();
      g.beginPath(); g.moveTo(0, -11); g.lineTo(-5.5, -16); g.moveTo(0, -11); g.lineTo(5.5, -16); g.stroke();
      g.restore();
    }
    g.shadowBlur = 0;
    g.fillStyle = '#f2fbff'; g.beginPath(); g.arc(0, 0, 3.8, 0, TAU); g.fill();
    g.restore();
  }
  else if (key === 'cannon'){
    g.save(); g.translate(cx, cy); g.rotate(-Math.PI/5);
    g.save(); g.globalCompositeOperation = 'lighter';                    // muzzle flash
    const fl = g.createRadialGradient(21, 0, 1, 21, 0, 13);
    fl.addColorStop(0, 'rgba(255,240,180,.95)'); fl.addColorStop(1, 'rgba(255,150,50,0)');
    g.fillStyle = fl; g.beginPath(); g.arc(21, 0, 13, 0, TAU); g.fill();
    g.restore();
    const bl = g.createLinearGradient(0, -7, 0, 7);                      // barrel
    bl.addColorStop(0, '#9aa3ae'); bl.addColorStop(1, '#4a515a');
    g.fillStyle = bl; g.strokeStyle = '#14171b'; g.lineWidth = 2;
    g.beginPath(); g.roundRect(-19, -7, 38, 14, 5); g.fill(); g.stroke();
    g.fillStyle = '#f0c05a'; g.fillRect(-8, -7, 5, 14);                  // gold band
    g.fillStyle = '#2b3036';                                             // breech
    g.beginPath(); g.arc(-19, 0, 7.5, 0, TAU); g.fill(); g.stroke();
    g.restore();
  }
  else { // tesla — lightning bolt
    g.save(); g.translate(cx, cy);
    g.shadowColor = 'rgba(255,225,120,.95)'; g.shadowBlur = 10;
    const bolt = [[7,-22],[-8,3],[-1,3],[-7,22],[9,-2],[2,-2]];
    g.fillStyle = '#ffe98a'; g.strokeStyle = '#b98515'; g.lineWidth = 1.6;
    g.beginPath(); g.moveTo(bolt[0][0], bolt[0][1]);
    for (let i = 1; i < bolt.length; i++) g.lineTo(bolt[i][0], bolt[i][1]);
    g.closePath(); g.fill();
    g.shadowBlur = 0; g.stroke();
    g.restore();
  }
}

const dock = document.getElementById('dock');
const cards = {};
function buildCards(){
  TKEYS.forEach((key, i) => {
    const d = TDEF[key];
    const el = document.createElement('div');
    el.className = 'card';
    el.title = d.desc;
    const ic = document.createElement('canvas');
    ic.width = 128; ic.height = 128;
    const g = ic.getContext('2d'); g.scale(2, 2);
    drawCardIcon(g, key);
    el.appendChild(ic);
    const nm = document.createElement('div'); nm.className = 'nm'; nm.textContent = d.name;
    const ct = document.createElement('div'); ct.className = 'ct';
    ct.innerHTML = '<span class="coin"></span>' + d.cost;
    el.appendChild(nm); el.appendChild(ct);
    el.onclick = () => { ac(); togglePlacing(key); };
    dock.appendChild(el);
    cards[key] = el;
  });
}
function syncCards(){
  for (const key of TKEYS){
    cards[key].classList.toggle('sel', placing === key);
    cards[key].classList.toggle('off', gold < TDEF[key].cost);
    cards[key].classList.toggle('can', gold >= TDEF[key].cost);
  }
}

// ---------- interactive tutorial ----------
const tut = { active:false, step:0, spot:null, t:0 };
let tutSeen = false;
function findTutSpot(){
  const s = bestSpot();
  return s ? { x: s.x, y: s.y } : null;
}
function tutSet(step){
  tut.step = step;
  document.querySelectorAll('.tut-glow').forEach(e => e.classList.remove('tut-glow'));
  const st = document.getElementById('tutStep'), tx = document.getElementById('tutTxt');
  if (step === 1){
    st.textContent = 'STEP 1/4';
    tx.innerHTML = 'Pick a tower — tap the <b>ARCHER</b> card below';
    cards.archer.classList.add('tut-glow');
  } else if (step === 2){
    st.textContent = 'STEP 2/4';
    tx.innerHTML = 'Place it on the <b>glowing spot</b> beside the path<br><span class="dim">green ring = OK · red ring = blocked</span>';
    tut.spot = findTutSpot();
  } else if (step === 3){
    st.textContent = 'STEP 3/4';
    tx.innerHTML = 'Nice! Press the big <b>▶ START WAVE</b> button to release the horde';
    nwBtn.classList.add('tut-glow');
  } else if (step === 4){
    st.textContent = 'STEP 4/4';
    tx.innerHTML = 'Kills earn <b>gold</b> — tap any tower to <b>UPGRADE</b> or sell it. Good luck!';
    tut.t = 7;
  }
  document.getElementById('tut').classList.add('show');
}
function tutStart(){ tut.active = true; tutSet(1); }
function tutDone(){
  tut.active = false; tut.spot = null;
  document.getElementById('tut').classList.remove('show');
  document.querySelectorAll('.tut-glow').forEach(e => e.classList.remove('tut-glow'));
}
function tutUpdate(dt){
  if (!tut.active) return;
  if (state === 'over' || state === 'won'){ tutDone(); return; }
  switch (tut.step){
    case 1:
      if (towers.length >= 1) tutSet(3);
      else if (placing) tutSet(2);
      break;
    case 2:
      if (towers.length >= 1) tutSet(3);
      else if (!placing) tutSet(1);
      break;
    case 3:
      if (state === 'wave') tutSet(4);
      break;
    case 4:
      tut.t -= dt;
      if (tut.t <= 0 || selTower) tutDone();
      break;
  }
}
document.getElementById('tutSkip').onclick = tutDone;

// ---------- main loop ----------
let last = performance.now();
function loop(now){
  requestAnimationFrame(loop);
  const rdt = Math.min(.05, (now - last) / 1000);
  last = now;
  time += rdt;
  const gdt = rdt * SPEED;
  if (state === 'wave' || state === 'idle') updateCombat(gdt);
  updateFxAmbient((state === 'menu') ? 0 : gdt, rdt);
  tutUpdate(rdt);
  render();
  syncUI();
}
